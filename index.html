<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dragon Creator Z</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #08090f;
        --panel: #0d1020;
        --panel-alt: #12172e;
        --border: #2a3560;
        --accent: #00e5ff;
        --accent2: #4a6aff;
        --text: #e8eaf6;
        --muted: #7d8bb3;
        --radius: 16px;
        --shadow: 0 24px 80px rgba(0, 0, 0, 0.25);
        --transition: 180ms ease;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background: radial-gradient(circle at top, rgba(0, 229, 255, 0.14), transparent 30%), #06070d;
        color: var(--text);
        font-family: "Rajdhani", sans-serif;
      }

      body {
        display: flex;
        justify-content: center;
        align-items: stretch;
        min-height: 100vh;
      }

      button,
      input {
        font: inherit;
      }

      .page-shell {
        width: min(1200px, calc(100vw - 24px));
        margin: 24px auto;
        display: flex;
        flex-direction: column;
        gap: 18px;
      }

      .app-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 18px 22px;
        border-radius: var(--radius);
        background: linear-gradient(180deg, rgba(14, 18, 36, 0.96), rgba(12, 14, 28, 0.98));
        border: 1px solid rgba(255, 255, 255, 0.06);
        box-shadow: var(--shadow);
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 14px;
      }

      .brand-symbol {
        width: 48px;
        height: 48px;
        display: grid;
        place-items: center;
        border-radius: 16px;
        background: linear-gradient(135deg, rgba(0, 229, 255, 0.24), rgba(74, 106, 255, 0.16));
        color: var(--accent);
        font-size: 26px;
        box-shadow: 0 0 18px rgba(0, 229, 255, 0.18);
      }

      .brand-title {
        display: grid;
        gap: 4px;
      }

      .brand-title h1 {
        margin: 0;
        font-family: "Orbitron", monospace;
        font-size: clamp(1.4rem, 2.5vw, 2.4rem);
        letter-spacing: 0.2em;
      }

      .brand-title p {
        margin: 0;
        color: var(--muted);
        font-size: 0.92rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .primary-btn {
        padding: 14px 18px;
        border: none;
        border-radius: 999px;
        color: #070b14;
        background: linear-gradient(135deg, var(--accent), var(--accent2));
        cursor: pointer;
        font-weight: 700;
        letter-spacing: 0.08em;
        transition: transform var(--transition), filter var(--transition), box-shadow var(--transition);
      }

      .primary-btn:hover {
        transform: translateY(-1px);
        filter: brightness(1.05);
        box-shadow: 0 12px 30px rgba(0, 229, 255, 0.22);
      }

      .import-panel {
        border-radius: var(--radius);
        background: rgba(15, 18, 34, 0.92);
        border: 1px solid rgba(255, 255, 255, 0.06);
        padding: 18px;
        display: grid;
        gap: 18px;
        box-shadow: var(--shadow);
      }

      .import-panel.hidden {
        display: none;
      }

      .import-row {
        display: grid;
        grid-template-columns: 1fr minmax(240px, 420px);
        gap: 14px;
      }

      .file-label,
      .url-group {
        display: grid;
        gap: 10px;
      }

      .file-label {
        padding: 14px 16px;
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.04);
        border: 1px dashed rgba(0, 229, 255, 0.2);
        color: var(--text);
      }

      .file-label input {
        display: block;
        width: 100%;
      }

      .url-input {
        width: 100%;
        min-height: 48px;
        padding: 12px 14px;
        border-radius: 14px;
        outline: none;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(255, 255, 255, 0.04);
        color: var(--text);
      }

      .secondary-btn {
        width: 100%;
        padding: 14px 18px;
        border-radius: 14px;
        border: 1px solid rgba(0, 229, 255, 0.18);
        background: rgba(0, 229, 255, 0.08);
        color: var(--accent);
        cursor: pointer;
        transition: transform var(--transition), background var(--transition);
      }

      .secondary-btn:hover {
        transform: translateY(-1px);
        background: rgba(0, 229, 255, 0.14);
      }

      .sheet-status {
        color: var(--muted);
        padding: 0 2px;
        font-size: 0.96rem;
      }

      .grid-stage {
        display: flex;
        flex-direction: column;
        gap: 14px;
      }

      .grid-header {
        font-family: "Orbitron", monospace;
        color: var(--accent);
        letter-spacing: 0.16em;
        text-transform: uppercase;
        font-size: 0.95rem;
      }

      .canvas-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 18px;
      }

      .preview-card {
        background: rgba(11, 13, 24, 0.94);
        border: 1px solid rgba(255, 255, 255, 0.06);
        border-radius: 20px;
        padding: 16px;
        display: grid;
        gap: 14px;
        box-shadow: var(--shadow);
      }

      .preview-label {
        font-size: 0.88rem;
        letter-spacing: 0.12em;
        color: var(--text);
        text-transform: uppercase;
      }

      .preview-canvas {
        width: 100%;
        height: auto;
        border-radius: 14px;
        background: rgba(8, 9, 15, 0.95);
        border: 1px solid rgba(255, 255, 255, 0.06);
        image-rendering: pixelated;
        image-rendering: crisp-edges;
      }

      #toastContainer {
        position: fixed;
        right: 20px;
        bottom: 24px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        pointer-events: none;
        z-index: 100;
      }

      .toast {
        padding: 12px 18px;
        border-radius: 14px;
        backdrop-filter: blur(16px);
        background: rgba(8, 11, 20, 0.92);
        border: 1px solid rgba(0, 229, 255, 0.14);
        color: var(--text);
        min-width: 220px;
        box-shadow: 0 22px 50px rgba(0, 0, 0, 0.28);
        animation: toastIn 240ms ease;
      }

      @keyframes toastIn {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
      }

      @media (max-width: 820px) {
        .import-row {
          grid-template-columns: 1fr;
        }

        .app-header {
          flex-direction: column;
          align-items: stretch;
          gap: 14px;
        }
      }
    </style>
  </head>
  <body>
    <div class="page-shell">
      <header class="app-header">
        <div class="brand">
          <div class="brand-symbol">⚡</div>
          <div class="brand-title">
            <h1>Dragon Creator Z</h1>
            <p>Spritesheet Grid Preview</p>
          </div>
        </div>
        <button id="toggleImport" class="primary-btn">Importar Spritesheet</button>
      </header>

      <section class="import-panel hidden" id="importPanel">
        <div class="import-row">
          <label class="file-label">Cargar PNG local
            <input id="sheetFileInput" type="file" accept="image/png,image/*" />
          </label>
          <div class="url-group">
            <input id="sheetUrlInput" class="url-input" type="url" placeholder="https://.../spritesheet.png" />
            <button id="loadUrlBtn" class="secondary-btn">Cargar URL</button>
          </div>
        </div>
        <div id="sheetStatus" class="sheet-status">Ningún spritesheet importado.</div>
      </section>

      <main class="grid-stage">
        <div class="grid-header">Vista principal de la grilla</div>
        <section class="canvas-grid" id="canvasGrid"></section>
      </main>
    </div>

    <div id="toastContainer"></div>

    <script src="character-system.js"></script>
    <script>
      "use strict";

      const toastContainer = document.getElementById("toastContainer");
      const importPanel = document.getElementById("importPanel");
      const toggleImport = document.getElementById("toggleImport");
      const sheetFileInput = document.getElementById("sheetFileInput");
      const sheetUrlInput = document.getElementById("sheetUrlInput");
      const loadUrlBtn = document.getElementById("loadUrlBtn");
      const canvasGrid = document.getElementById("canvasGrid");
      const sheetStatus = document.getElementById("sheetStatus");

      const previewDefinitions = [
        { label: "IDLE", action: "idle", direction: 1 },
        { label: "WALK", action: "walk", direction: 1 },
        { label: "RUN", action: "run", direction: 1 },
        { label: "JUMP", action: "jump", direction: 1 },
        { label: "FALL", action: "fall", direction: -1 },
        { label: "HOVER", action: "hover", direction: 1 },
      ];

      const state = {
        imageMap: {},
        previews: [],
        importing: false,
      };

      function showToast(message, kind = "success") {
        const toast = document.createElement("div");
        toast.className = "toast";
        toast.textContent = message;
        toastContainer.appendChild(toast);
        setTimeout(() => toast.remove(), 2800);
      }

      function getCharState() {
        return {
          spriteVariantId: player.appearance?.variantId || "base",
          viewKey: null,
          auraPhase: 0,
          glovesId: player.appearance?.glovesId || "gm0",
          auraId: player.appearance?.auraId || "a0",
          auraColor: player.appearance?.auraColor || "#00e5ff",
          accessoryId: "ac_none",
        };
      }

      function buildPreviewGrid() {
        canvasGrid.innerHTML = "";
        state.previews = previewDefinitions.map((definition) => {
          const card = document.createElement("article");
          card.className = "preview-card";

          const label = document.createElement("div");
          label.className = "preview-label";
          label.textContent = definition.label;

          const canvas = document.createElement("canvas");
          canvas.className = "preview-canvas";
          canvas.width = 220;
          canvas.height = 260;

          card.append(label, canvas);
          canvasGrid.appendChild(card);

          const animator = new SpriteAnimator(definition.action);
          animator.play(definition.action);
          return {
            canvas,
            ctx: canvas.getContext("2d"),
            animator,
            direction: definition.direction,
          };
        });
      }

      function renderPreviewCells(timestamp) {
        state.previews.forEach((cell) => {
          cell.animator.update(timestamp);
          const { canvas, ctx, animator, direction } = cell;
          const width = canvas.width;
          const height = canvas.height;
          ctx.clearRect(0, 0, width, height);
          const playerCopy = Object.assign({}, player, { direction });
          drawPlayer(ctx, width / 2, height - 16, playerCopy, state.imageMap, animator, getCharState());
        });
      }

      function loop(timestamp = performance.now()) {
        renderPreviewCells(timestamp);
        requestAnimationFrame(loop);
      }

      function setImportedSheet(url, img) {
        player.appearance = player.appearance || {};
        player.appearance.variantId = "base";
        player.appearance.variantCustomizations = player.appearance.variantCustomizations || {};
        player.appearance.variantCustomizations.base = {
          spriteImage: img,
          spriteDataURL: url,
          scale: 1,
          animFrames: 6,
          rowCount: 14,
        };
        player.spriteSheets = {
          base: url,
          pelea: url,
          especial: url,
        };
        sheetStatus.textContent = `Spritesheet activo · ${img.naturalWidth}×${img.naturalHeight}`;
        showToast("Spritesheet cargado correctamente", "success");
      }

      function loadImageFromUrl(url) {
        return new Promise((resolve, reject) => {
          const img = new Image();
          img.crossOrigin = "anonymous";
          img.onload = () => resolve(img);
          img.onerror = () => reject(new Error("No se pudo cargar la imagen desde la URL."));
          img.src = url;
        });
      }

      async function handleFileImport(file) {
        if (!file) return;
        try {
          state.importing = true;
          const url = URL.createObjectURL(file);
          const img = await loadImageFromUrl(url);
          setImportedSheet(url, img);
        } catch (error) {
          showToast("Error cargando el spritesheet local.", "error");
          console.error(error);
        } finally {
          state.importing = false;
        }
      }

      async function handleUrlImport(url) {
        if (!url) {
          showToast("Ingresá una URL válida.", "warning");
          return;
        }
        try {
          state.importing = true;
          const img = await loadImageFromUrl(url);
          setImportedSheet(url, img);
        } catch (error) {
          showToast("Error cargando spritesheet desde URL.", "error");
          console.error(error);
        } finally {
          state.importing = false;
        }
      }

      function initEvents() {
        toggleImport.addEventListener("click", () => {
          importPanel.classList.toggle("hidden");
          sheetUrlInput.focus();
        });

        sheetFileInput.addEventListener("change", async (event) => {
          const file = event.target.files?.[0];
          event.target.value = "";
          if (file) {
            await handleFileImport(file);
          }
        });

        loadUrlBtn.addEventListener("click", async () => {
          await handleUrlImport(sheetUrlInput.value.trim());
        });

        sheetUrlInput.addEventListener("keydown", async (event) => {
          if (event.key === "Enter") {
            event.preventDefault();
            await handleUrlImport(sheetUrlInput.value.trim());
          }
        });
      }

      async function init() {
        if (!window.CharacterSystem) {
          document.body.innerHTML = '<p style="color:#f44;padding:40px;font-family:monospace">ERROR: character-system.js no encontrado.</p>';
          return;
        }

        const {
          player: enginePlayer,
          SpriteAnimator: EngineAnimator,
          initPlayer: engineInitPlayer,
          preloadAssets: enginePreloadAssets,
          drawPlayer: engineDrawPlayer,
        } = window.CharacterSystem;

        window.player = enginePlayer;
        window.SpriteAnimator = EngineAnimator;
        window.initPlayer = engineInitPlayer;
        window.preloadAssets = enginePreloadAssets;
        window.drawPlayer = engineDrawPlayer;

        initPlayer();
        player.appearance = player.appearance || {};
        player.appearance.variantId = player.appearance.variantId || "base";
        player.appearance.variantCustomizations = player.appearance.variantCustomizations || {};

        try {
          state.imageMap = await preloadAssets("", { quiet: true });
          sheetStatus.textContent = "Sprites y assets cargados. Importá tu spritesheet para ver la grilla.";
        } catch (error) {
          console.error(error);
          sheetStatus.textContent = "No se pudieron cargar los assets base.";
          showToast("Falló la carga inicial de assets.", "error");
        }

        buildPreviewGrid();
        initEvents();
        requestAnimationFrame(loop);
      }

      init();
    </script>
  </body>
</html>
