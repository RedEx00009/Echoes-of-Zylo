      function loadSlots() {
        try {
          const raw=localStorage.getItem(LS_KEY);
          const parsed=raw?JSON.parse(raw):null;
          savedSlots = Array.isArray(parsed)
            ? Array.from({length:11},(_,i)=>{
                const slot = parsed[i] ?? null;
                if (slot) normalizeSlotSheetUrls(slot);
                return slot;
              })
            : Array(11).fill(null);
        } catch {
          savedSlots=Array(11).fill(null);
        }
        const si=parseInt(localStorage.getItem(LS_SLOT)||"0",10);
        activeSlotIndex=Number.isFinite(si)?Math.max(0,Math.min(10,si)):0;
      }

      function saveSlots() {
        try {
          localStorage.setItem(LS_KEY,JSON.stringify(savedSlots));
        } catch(e) {
          console.warn("[DC] localStorage lleno — intentando limpiar dataURLs grandes...");
          const slim=savedSlots.map(s=>{
            if(!s) return null;
            const copy=JSON.parse(JSON.stringify(s));
            // Remove top-level large dataURLs
            if(copy.accessoryDataURL && copy.accessoryDataURL.length>MAX_DATAURL_BYTES) delete copy.accessoryDataURL;
            if(copy.previewDataURL && copy.previewDataURL.length>MAX_DATAURL_BYTES) delete copy.previewDataURL;
            ["base","pelea","especial","combate","special"].forEach(key => {
              if(copy[key] && typeof copy[key] === 'string' && copy[key].length>MAX_DATAURL_BYTES) delete copy[key];
            });
            if(copy.spriteSheets && typeof copy.spriteSheets === 'object') {
              if(copy.spriteSheets.base && copy.spriteSheets.base.length>MAX_DATAURL_BYTES) delete copy.spriteSheets.base;
              if(copy.spriteSheets.pelea && copy.spriteSheets.pelea.length>MAX_DATAURL_BYTES) delete copy.spriteSheets.pelea;
              if(copy.spriteSheets.especial && copy.spriteSheets.especial.length>MAX_DATAURL_BYTES) delete copy.spriteSheets.especial;
            }
            // Trim variant customizations large sheets
            if(copy.variantCustomizations && typeof copy.variantCustomizations === 'object') {
              Object.values(copy.variantCustomizations).forEach(cfg => {
                if(!cfg) return;
                if(cfg.spriteDataURL && cfg.spriteDataURL.length>MAX_DATAURL_BYTES) delete cfg.spriteDataURL;
                if(cfg.combatSpriteDataURL && cfg.combatSpriteDataURL.length>MAX_DATAURL_BYTES) delete cfg.combatSpriteDataURL;
                if(cfg.specialSpriteDataURL && cfg.specialSpriteDataURL.length>MAX_DATAURL_BYTES) delete cfg.specialSpriteDataURL;
              });
            }
            // Trim combat customization
            if(copy.combatCustomization) {
              if(copy.combatCustomization.spriteDataURL && copy.combatCustomization.spriteDataURL.length>MAX_DATAURL_BYTES) delete copy.combatCustomization.spriteDataURL;
            }
            return copy;
          });
          try { localStorage.setItem(LS_KEY,JSON.stringify(slim)); }
          catch(e2) { console.error("[DC] No se pudo guardar slots:",e2); }
        }
      }

      function saveToSlot(i) {
        try {
          const accId=charState.accessoryId||player.appearance.accessoryId||"ac_none";
          const accEntry=ACCESSORIES_CATALOG.find(a=>a.id===accId);
          let accessoryDataURL=null;
          let accessoryCombatDataURL=null;
          let accessorySpecialDataURL=null;
          if(accEntry&&accEntry.dataURL){
            if(accEntry.dataURL.length<=MAX_DATAURL_BYTES) accessoryDataURL=accEntry.dataURL;
            else console.warn("[DC] dataURL del accesorio demasiado grande para LS, se omite.");
          }
          if(accEntry&&accEntry.combatDataURL){
            if(accEntry.combatDataURL.length<=MAX_DATAURL_BYTES) accessoryCombatDataURL=accEntry.combatDataURL;
            else console.warn("[DC] dataURL de combate del accesorio demasiado grande para LS, se omite.");
          }
          if(accEntry&&accEntry.specialDataURL){
            if(accEntry.specialDataURL.length<=MAX_DATAURL_BYTES) accessorySpecialDataURL=accEntry.specialDataURL;
            else console.warn("[DC] dataURL especial del accesorio demasiado grande para LS, se omite.");
          }
          const accessoryIsFreeCustomization=!!(accEntry?.isFreeCustomization||FREE_CUSTOMIZATION_CATALOG.some(a=>a.id===accId)||player.appearance.raceId==="Custom"||String(accId).startsWith("fc_"));
          const d={
            name:             document.getElementById("charName").value||"Guerrero Z",
            level:            1,
            race:             player.appearance.raceId,
            gender:           player.appearance.gender,
            variantId:        player.appearance.variantId||"base",
            variantCustomizations: serializableVariantCustomizations(player.appearance.variantCustomizations),
            combatCustomization:   serializableCombatCustomization(player.appearance.combatCustomization),
            faceId:           player.appearance.faceId,
            faceColor:        player.appearance.faceColor,
            browColor:        player.appearance.browColor||null,
            pupilColor:       player.appearance.pupilColor||null,
            hair:             player.appearance.hairId,
            hairColor:        player.appearance.hairColor,
            shirt:            player.appearance.topId,
            pants:            player.appearance.bottomId,
            shoes:            player.appearance.shoesId,
            skinColor:        player.appearance.skinColor,
            eyeColor:         player.appearance.eyeColor,
            gloves:           charState.glovesId||player.appearance.glovesId||"gm0",
            aura:             charState.auraId||player.appearance.auraId||"a0",
            auraColor:        charState.auraColor||player.appearance.auraColor||"#fdd835",
            clothColor:       charState.clothColor||"#ff6a00",
            accessory:        accId,
            accessorySlot:    accEntry?.slot || "over_shirt",
            accessoryType:    accEntry?.type || "other",
            accessoryDataURL,
            accessoryCombatDataURL,
            accessorySpecialDataURL,
            accessoryIsFreeCustomization,
            accessoryName:    accEntry?.name||null,
          };
          const activeKey = player.appearance.spriteSheets?.activeKey || null;
          const fallbackSheet = player.appearance.spriteSheets?.sheet || null;
          const sheetData = {};
          if (activeKey) {
            sheetData.activeKey = activeKey;
          } else if (fallbackSheet) {
            sheetData.sheet = fallbackSheet;
          }
          d.spriteSheets = sheetData;
          savedSlots[i] = d; activeSlotIndex = i;
          localStorage.setItem(LS_SLOT, String(i));
          saveSlots(); renderSlots();
          showToast(`"${d.name}" guardado en slot ${i+1}`, "success");
          void _syncSlotToFirebase(i, d);
        } catch(err) {
          console.error("[DC] saveToSlot error:",err);
          showToast("Error al guardar — revisá la consola","error");
        }
      }

      async function loadFromSlot(i) {
        try {
          const d = savedSlots[i]; if (!d) throw new Error("Slot vacío o inválido");
          normalizeSlotSheetUrls(d);
          const sheetRef = d?.spriteSheets?.activeKey || d?.spriteSheets?.sheet || d?.base || d?.pelea || d?.especial || d?.combate || d?.special || "";
          const resolvedUrl = await _resolveImportedSheetUrl(sheetRef);
          const sheetSrc = resolvedUrl || (/^(blob:|data:|https?:\/\/)/i.test(sheetRef) ? sheetRef : "");

          player.appearance.raceId    = d.race      || "human";
          player.appearance.gender    = d.gender    || "male";
          player.appearance.variantId = d.variantId || "base";
          player.appearance.spriteSheets = {
            activeKey: d?.spriteSheets?.activeKey || null,
            sheet: sheetRef || null,
            base: sheetRef || null,
            pelea: sheetRef || null,
            especial: sheetRef || null,
          };
          player.spriteSheets = { base: sheetSrc, pelea: sheetSrc, especial: sheetSrc };

          const customVariantId = player.appearance.variantId || "base";
          const variantCustomizations = Object.assign({}, d.variantCustomizations || {});
          variantCustomizations[customVariantId] = Object.assign({}, variantCustomizations[customVariantId] || {});

          variantCustomizations[customVariantId].spriteDataURL = sheetSrc || variantCustomizations[customVariantId].spriteDataURL;
          variantCustomizations[customVariantId].spriteImage = null;
          variantCustomizations[customVariantId].specialSpriteDataURL = sheetSrc || variantCustomizations[customVariantId].specialSpriteDataURL;
          variantCustomizations[customVariantId].specialSpriteImage = null;

          const combatCustomization = Object.assign({}, d.combatCustomization || {});
          if (sheetSrc) {
            combatCustomization.spriteDataURL = sheetSrc;
            combatCustomization.spriteImage = null;
          }

          hydrateVariantCustomizations(variantCustomizations);
          hydrateCombatCustomization(combatCustomization);
          await applySlotSpriteUrls(d);

          player.appearance.faceId      = d.faceId     || "fm0";
          player.appearance.faceColor   = d.faceColor  || null;
          player.appearance.browColor   = d.browColor  || null;
          player.appearance.pupilColor  = d.pupilColor || null;
          player.appearance.hairId      = d.hair       || "hm1";
          player.appearance.hairColor   = d.hairColor  || "#1a1a1a";
          player.appearance.topId       = d.shirt      || "sm1";
          player.appearance.bottomId    = d.pants      || "pm1";
          player.appearance.shoesId     = d.shoes      || "shm1";
          player.appearance.skinColor   = d.skinColor  || "#e8c898";
          player.appearance.eyeColor    = d.eyeColor   || "#3a2a1a";
          charState.glovesId            = d.gloves     || "gm0";
          charState.auraId              = d.aura       || "a0";
          charState.auraColor           = d.auraColor  || "#fdd835";
          charState.clothColor          = d.clothColor || "#ff6a00";
          player.appearance.glovesId    = charState.glovesId;
          player.appearance.auraId      = charState.auraId;
          player.appearance.auraColor   = charState.auraColor;

          const accId = d.accessory || "ac_none";
          const existing = ACCESSORIES_CATALOG.find(a => a.id === accId);
          if (!existing && d.accessoryDataURL && accId !== "ac_none") {
            const img = new Image(); img.src = d.accessoryDataURL;
            const isFreeCat = !!(d.accessoryIsFreeCustomization || d.race === "Custom" || accId.startsWith("fc_"));
            const entry = { id: accId, name: d.accessoryName || "Personalización", type: "other", slot: "over_shirt", color: null, userImage: img, spriteImage: img, dataURL: d.accessoryDataURL, raceName: null, isFreeCustomization: isFreeCat };
            if (d.accessoryCombatDataURL) {
              const ci = new Image(); ci.src = d.accessoryCombatDataURL;
              entry.combatUserImage = ci;
              entry.combatDataURL = d.accessoryCombatDataURL;
            }
            if (d.accessorySpecialDataURL) {
              const si = new Image(); si.src = d.accessorySpecialDataURL;
              entry.specialUserImage = si;
              entry.specialDataURL = d.accessorySpecialDataURL;
            }
            ACCESSORIES_CATALOG.push(entry);
            if (isFreeCat && !FREE_CUSTOMIZATION_CATALOG.find(x => x.id === accId)) FREE_CUSTOMIZATION_CATALOG.push(entry);
          }
          charState.accessoryId         = accId;
          player.appearance.accessoryId = accId;
          document.getElementById("charName").value = d.name || "Guerrero Z";
          invalidateHairCache();
          activeSlotIndex = i; localStorage.setItem(LS_SLOT, String(i));
          renderSlots(); renderItemsPanel(activeCategory); updateStats();
          showToast(`"${d.name}" cargado`, "success");
        } catch (err) {
          console.warn("loadFromSlot falló:", err);
          player.appearance.raceId = "human";
          player.appearance.gender = "male";
          player.appearance.variantId = "base";
          player.appearance.variantCustomizations = {};
          player.appearance.combatCustomization = {};
          player.appearance.faceId = "fm0";
          player.appearance.hairId = "hm1";
          player.appearance.topId = "sm1";
          player.appearance.bottomId = "pm1";
          player.appearance.shoesId = "shm1";
          player.appearance.skinColor = "#e8c898";
          player.appearance.eyeColor = "#3a2a1a";
          charState.glovesId = "gm0";
          charState.auraId = "a0";
          charState.auraColor = "#fdd835";
          player.appearance.glovesId = charState.glovesId;
          player.appearance.auraId = charState.auraId;
          player.appearance.auraColor = charState.auraColor;
          invalidateHairCache();
          showToast("Slot inicializado por defecto", "warning");
        }
      }

      function deleteSlot(i) {
        savedSlots[i]=null; saveSlots(); renderSlots();
        showToast(`Slot ${i+1} eliminado`,"warning");
      }

      function renderSlots() {
        const list=document.getElementById("slotsList"); list.innerHTML="";
        for(let i=0;i<11;i++){
          const d=savedSlots[i];
          const card=document.createElement("div");
          card.className="slot-card"+(d?"":" empty")+(i===activeSlotIndex&&d?" active-slot":"");
          const num=document.createElement("div"); num.className="slot-num"; num.textContent=i+1;
          const miniWrap=document.createElement("div"); miniWrap.className="slot-mini";
          const mcv=document.createElement("canvas"); mcv.width=34; mcv.height=44;
          const mctx=mcv.getContext("2d");
          mctx.fillStyle="#0d1020"; mctx.fillRect(0,0,34,44);
          if(d){
            try{
              const sr=d.race||"human",sg=d.gender||"male";
              const slotGloves=d.gloves||getDefaultIds(sr,sg).glovesId;
              const slotAcc=d.accessory||"ac_none";
              const mp={direction:1,appearance:{
                raceId:sr,gender:sg,variantId:d.variantId||"base",
                variantCustomizations:d.variantCustomizations||{},combatCustomization:d.combatCustomization||{},
                faceId:d.faceId||getDefaultIds(sr,sg).faceId,faceColor:d.faceColor||null,
                hairId:d.hair||getDefaultIds(sr,sg).hairId,hairColor:d.hairColor||"#1a1a1a",
                topId:d.shirt||getDefaultIds(sr,sg).topId,bottomId:d.pants||getDefaultIds(sr,sg).bottomId,
                shoesId:d.shoes||getDefaultIds(sr,sg).shoesId,
                skinColor:d.skinColor||"#e8c898",eyeColor:d.eyeColor||"#3a2a1a",
                glovesId:slotGloves,auraId:"a0",auraColor:"#fdd835",accessoryId:slotAcc,
              }};
              drawPlayer(mctx,17,42,mp,imageMap,null,{glovesId:slotGloves,auraId:"a0",auraColor:"#fdd835",accessoryId:slotAcc,auraPhase:0,viewKey:null});
            }catch(e){console.warn("Error dibujando slot mini:",e);}
          } else {
            mctx.fillStyle="#2a3560"; mctx.font="22px sans-serif"; mctx.textAlign="center"; mctx.fillText("+",17,32);
          }
          miniWrap.appendChild(mcv);
          const info=document.createElement("div"); info.className="slot-info";
          const nm=document.createElement("div"); nm.className="slot-name"; nm.textContent=d?d.name:"VACÍO";
          const lv=document.createElement("div"); lv.className="slot-level"; lv.textContent=d?`NIVEL ${d.level||1}`:"—";
          info.appendChild(nm); info.appendChild(lv);
          card.appendChild(num); card.appendChild(miniWrap); card.appendChild(info);
          if(d){
            const lb=document.createElement("button"); lb.className="slot-save-btn"; lb.textContent="CARGAR";
            lb.addEventListener("click",e=>{e.stopPropagation(); void loadFromSlot(i);});
            const db=document.createElement("button"); db.className="slot-delete-btn"; db.innerHTML="✕";
            db.addEventListener("click",e=>{e.stopPropagation();deleteSlot(i);});
            card.appendChild(lb); card.appendChild(db);
            card.addEventListener("click",()=>saveToSlot(i)); card.title="Click para sobreescribir";
          } else {
            const sb=document.createElement("button"); sb.className="slot-save-btn"; sb.textContent="GUARDAR";
            sb.addEventListener("click",e=>{e.stopPropagation();saveToSlot(i);});
            card.appendChild(sb);
          }
          list.appendChild(card);
        }
      }

        });
        document.getElementById("btnZoom").addEventListener("click",()=>{
          uiZoom=uiZoom===1?1.25:uiZoom===1.25?0.8:1;
          showToast(`Zoom: ${Math.round(uiZoom*100)}%`,"success");
        });
        document.getElementById("btnRotate").addEventListener("click",()=>
          showToast("Rotación no disponible en esta versión","warning")
        );
        document.getElementById("charName").addEventListener("input",e=>{
          charState.name=e.target.value||"Guerrero Z";
        });

        });
        document.getElementById("btnImportCharacter").addEventListener("click",()=>{
          document.getElementById("characterImportInput").click();
        });

          const file = e.target.files && e.target.files[0];
          if (file) importCharacterFromJson(file);
          e.target.value = "";
        });
        document.getElementById("btnStart").addEventListener("click",()=>{
          try {
            const slotIndex = activeSlotIndex;
            saveToSlot(slotIndex);
            showToast(`Iniciando con slot ${slotIndex+1}...`,"success");
            let attempts = 0;
            const confirmAndRedirect = () => {
              try {
                const raw = localStorage.getItem(LS_KEY);
                if (raw) {
                  const parsed = JSON.parse(raw);
                  if (Array.isArray(parsed) && parsed[slotIndex] && parsed[slotIndex].name) {
                    window.location.href = `game.html?slot=${slotIndex}`;
                    return;
                  }
                }
              } catch (e) {}
              attempts++;
              if (attempts < 6) setTimeout(confirmAndRedirect, 150);
              else {
                showToast('No se pudo confirmar guardado — intentando de todos modos','warning');
                window.location.href = `game.html?slot=${slotIndex}`;
              }
            };
            setTimeout(confirmAndRedirect, 100);
          } catch(e) {
            console.error("[DC] Error en btnStart:",e);
            showToast("Error al iniciar — revisá la consola","error");
          }
        });
      }

      function showToast(msg,type="success"){
        const c=document.getElementById("toastContainer");
        const t=document.createElement("div"); t.className=`toast ${type}`; t.textContent=msg;
        c.appendChild(t); setTimeout(()=>t.remove(),3000);
      }

      async function init() {
        loadSlots();
        try {
          initPlayer();
          animator  = new SpriteAnimator("idle");
          finalAnim = new SpriteAnimator("idle");
          initViewAnimBar();
          showToast("Cargando sprites...","warning");
          await _restoreAccessoriesFromLS();
          _restoreFreeCustomizationFromLS();
          imageMap = await preloadAssets("",{quiet:true});
          const loaded=Object.values(imageMap).filter(Boolean).length;
          showToast(loaded>0?`${loaded} sprites cargados`:"Modo procedimental activo",loaded>0?"success":"warning");
          if(savedSlots[activeSlotIndex]){
            try {
              await loadFromSlot(activeSlotIndex);
            } catch(err) {
              console.warn("Slot corrupto:",err);
              savedSlots[activeSlotIndex] = null;
              saveSlots();
              showToast("Slot inicializado por defecto","warning");
            }
          }
          await _loadImportedSheetsOnStart();
          _attachImportedSheetEvents();
          renderItemsPanel("race"); renderSlots(); updateStats();
        } catch(err){
          console.error(err); imageMap=imageMap||{};
          showToast("Falló parte de la carga — modo procedural activo.","error");
          try{initViewAnimBar();renderItemsPanel("race");renderSlots();updateStats();}
          catch(e2){console.error(e2);}
        } finally {
          initEvents();
          requestAnimationFrame(loop);
        }
        setTimeout(()=>showToast("¡Bienvenido a Dragon Creator Z!","success"),500);
      }

      document.addEventListener("DOMContentLoaded", init);
    </script>
  </body>
</html>
