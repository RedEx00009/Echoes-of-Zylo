<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Dragon World Z</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet"/>
    <style>
      :root {
        --accent: #f5c400;
        --accent2: #ff6a00;
        --ki: #2979ff;
        --hp: #00e676;
        --danger: #ff1744;
        --ui-bg: rgba(8, 9, 15, 0.88);
        --font-head: "Orbitron", monospace;
        --font-body: "Rajdhani", sans-serif;
        --btn-size: 64px;
        --btn-size-sm: 54px;
        --btn-icon: 24px;
      }
      *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; user-select:none; -webkit-user-select:none; }
      html, body { width:100%; height:100%; overflow:hidden; background:#000; }
      body { font-family:var(--font-body); touch-action:none; }
      #screenLoading, #screenDead {
        position:fixed; inset:0; display:flex; flex-direction:column;
        align-items:center; justify-content:center;
        background:radial-gradient(ellipse at 50% 30%,#0a1535 0%,#08090f 70%);
        z-index:200;
      }
      #screenDead { background:radial-gradient(ellipse at 50% 30%,#350a0a 0%,#08090f 70%); display:none; }
      .screen-title { font-family:var(--font-head); font-size:clamp(22px,5vw,48px); font-weight:900; letter-spacing:4px; color:var(--accent); text-shadow:0 0 30px var(--accent),0 0 60px var(--accent2); margin-bottom:12px; }
      .screen-sub { font-family:var(--font-head); font-size:11px; letter-spacing:3px; color:#8892b0; margin-bottom:40px; }
      .loading-bar-wrap { width:280px; height:4px; background:#1a2040; border-radius:2px; overflow:hidden; }
      .loading-bar { height:100%; background:linear-gradient(90deg,var(--accent),var(--accent2)); border-radius:2px; width:0%; transition:width .3s ease; box-shadow:0 0 10px var(--accent); }
      .loading-label { font-family:var(--font-head); font-size:9px; letter-spacing:2px; color:#3d4a6b; margin-top:12px; }
      #respawnBtn { margin-top:24px; padding:16px 44px; background:linear-gradient(135deg,#b71c1c,#d32f2f); border:2px solid #ff5252; border-radius:6px; color:white; font-family:var(--font-head); font-size:13px; letter-spacing:3px; cursor:pointer; transition:all .2s; min-height:52px; touch-action:manipulation; }
      #respawnBtn:hover { box-shadow:0 0 20px rgba(255,82,82,.5); transform:translateY(-2px); }
      #gameCanvas { display:block; position:fixed; top:0; left:0; width:100vw; height:100vh; }
      #hud { position:fixed; inset:0; pointer-events:none; z-index:10; }
      .hud-top { position:absolute; top:12px; left:12px; right:12px; display:flex; align-items:flex-start; justify-content:space-between; gap:8px; }
      .left-menu { position:absolute; top:160px; left:12px; width:200px; background:var(--ui-bg); border:1px solid #2a3560; border-radius:10px; padding:12px; backdrop-filter:blur(8px); box-shadow:0 10px 30px rgba(0,0,0,.24); z-index:8; }
      .left-menu-title { font-family:var(--font-head); font-size:10px; letter-spacing:2px; color:var(--accent); margin-bottom:10px; text-transform:uppercase; }
      .menu-btn { width:100%; padding:12px 14px; background:linear-gradient(135deg,rgba(245,196,0,.12),rgba(245,196,0,.2)); border:1px solid rgba(245,196,0,.25); border-radius:8px; color:#fff; font-family:var(--font-head); font-size:12px; letter-spacing:1px; text-align:center; cursor:pointer; transition:transform .2s,box-shadow .2s,background .2s; touch-action:manipulation; }
      .menu-btn:hover { transform:translateY(-1px); box-shadow:0 0 16px rgba(245,196,0,.25); background:linear-gradient(135deg,rgba(245,196,0,.2),rgba(245,196,0,.28)); }
      .player-hud { background:var(--ui-bg); border:1px solid #2a3560; border-radius:8px; padding:8px 12px; min-width:180px; backdrop-filter:blur(8px); }
      .player-name { font-family:var(--font-head); font-size:11px; letter-spacing:2px; color:var(--accent); margin-bottom:6px; }
      .bar-row { display:flex; align-items:center; gap:6px; margin-bottom:4px; }
      .bar-icon { font-size:11px; width:14px; text-align:center; }
      .bar-track { flex:1; height:8px; background:rgba(255,255,255,.07); border-radius:3px; overflow:hidden; border:1px solid rgba(255,255,255,.08); }
      .bar-fill { height:100%; border-radius:2px; transition:width .2s ease; position:relative; }
      .bar-fill::after { content:""; position:absolute; top:0; left:0; right:0; height:50%; background:rgba(255,255,255,.2); border-radius:2px; }
      #barHp { background:linear-gradient(90deg,#00c853,var(--hp)); box-shadow:0 0 6px rgba(0,230,118,.5); }
      #barKi { background:linear-gradient(90deg,#1565c0,var(--ki)); box-shadow:0 0 6px rgba(41,121,255,.5); }
      .bar-val { font-family:var(--font-head); font-size:9px; color:#8892b0; min-width:32px; text-align:right; }
      .level-badge { display:flex; align-items:center; gap:6px; margin-top:5px; }
      .level-num { font-family:var(--font-head); font-size:9px; letter-spacing:1px; color:var(--accent); background:rgba(245,196,0,.1); border:1px solid rgba(245,196,0,.3); border-radius:3px; padding:1px 5px; }
      .xp-track { flex:1; height:4px; background:rgba(255,255,255,.07); border-radius:2px; overflow:hidden; }
      .xp-fill { height:100%; background:linear-gradient(90deg,var(--accent),var(--accent2)); border-radius:2px; transition:width .4s ease; }
      .enemy-hud { background:var(--ui-bg); border:1px solid #2a3560; border-radius:8px; padding:8px 12px; min-width:160px; backdrop-filter:blur(8px); opacity:0; transition:opacity .3s; }
      .enemy-hud.visible { opacity:1; }
      .enemy-name { font-family:var(--font-head); font-size:10px; letter-spacing:2px; color:var(--danger); margin-bottom:6px; }
      #barEnemyHp { background:linear-gradient(90deg,#b71c1c,var(--danger)); box-shadow:0 0 6px rgba(255,23,68,.5); }
      .minimap-wrap { position:absolute; top:12px; right:12px; width:90px; height:90px; background:var(--ui-bg); border:1px solid #2a3560; border-radius:6px; overflow:hidden; backdrop-filter:blur(8px); }
      #minimapCanvas { width:100%; height:100%; image-rendering:pixelated; }
      .minimap-label { position:absolute; bottom:4px; left:0; right:0; text-align:center; font-family:var(--font-head); font-size:7px; letter-spacing:2px; color:#3d4a6b; }
      .mission-box { position:absolute; top:120px; right:12px; background:var(--ui-bg); border:1px solid rgba(245,196,0,.3); border-left:3px solid var(--accent); border-radius:0 6px 6px 0; padding:8px 12px; max-width:190px; backdrop-filter:blur(8px); transform:translateX(110%); transition:transform .4s ease; }
      .mission-box.visible { transform:translateX(0); }
      .mission-title { font-family:var(--font-head); font-size:8px; letter-spacing:2px; color:var(--accent); margin-bottom:5px; }
      .mission-text { font-size:12px; color:#c8cfe8; line-height:1.4; }
      .mission-progress { font-family:var(--font-head); font-size:9px; color:#8892b0; margin-top:4px; }
      .db-counter { position:absolute; background:var(--ui-bg); border:1px solid rgba(245,196,0,.3); border-radius:8px; padding:8px 12px; display:flex; gap:6px; align-items:center; backdrop-filter:blur(8px); }
      .db-icon { font-size:16px; }
      .db-count { font-family:var(--font-head); font-size:11px; color:var(--accent); letter-spacing:1px; }
      .region-label { font-family:var(--font-head); font-size:10px; letter-spacing:3px; color:rgba(255,255,255,.4); pointer-events:none; }
      .skills-bar { position:absolute; bottom:20px; left:50%; transform:translateX(-50%); display:flex; gap:10px; }
      .skill-btn { width:var(--btn-size); height:var(--btn-size); background:var(--ui-bg); border:2px solid #2a3560; border-radius:10px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; backdrop-filter:blur(8px); position:relative; pointer-events:auto; cursor:pointer; transition:border-color .15s,box-shadow .15s; touch-action:manipulation; -webkit-tap-highlight-color:transparent; }
      .skill-btn:active, .skill-btn.active { border-color:var(--accent); box-shadow:0 0 14px rgba(245,196,0,.4); }
      .skill-icon { font-size:var(--btn-icon); }
      .skill-key { font-family:var(--font-head); font-size:8px; letter-spacing:1px; color:#3d4a6b; }
      .skill-cd { position:absolute; inset:0; background:rgba(0,0,0,.6); border-radius:9px; display:flex; align-items:center; justify-content:center; font-family:var(--font-head); font-size:14px; color:white; opacity:0; transition:opacity .2s; }
      .skill-cd.active { opacity:1; }
      .mobile-controls { position:absolute; bottom:0; left:0; right:0; height:160px; display:none; align-items:flex-end; justify-content:space-between; padding:0 20px 20px; pointer-events:auto; }
      .joystick-wrap { position:relative; width:120px; height:120px; }
      #joystickBase { position:absolute; inset:0; background:rgba(255,255,255,.06); border:2px solid rgba(255,255,255,.15); border-radius:50%; backdrop-filter:blur(4px); }
      #joystickKnob { position:absolute; width:52px; height:52px; background:radial-gradient(circle,rgba(245,196,0,.85),rgba(245,196,0,.45)); border:2px solid rgba(245,196,0,.7); border-radius:50%; top:34px; left:34px; box-shadow:0 0 14px rgba(245,196,0,.5); transition:transform .05s; }
      .action-btns { display:grid; grid-template-columns:repeat(2,1fr); gap:12px; }
      .action-btn { width:var(--btn-size); height:var(--btn-size); border-radius:50%; border:2px solid; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px; cursor:pointer; backdrop-filter:blur(8px); transition:all .12s; touch-action:manipulation; -webkit-tap-highlight-color:transparent; }
      .action-btn:active { transform:scale(.88); }
      .btn-attack { background:rgba(255,23,68,.2); border-color:rgba(255,23,68,.7); }
      .btn-ki { background:rgba(41,121,255,.2); border-color:rgba(41,121,255,.7); }
      .btn-dash { background:rgba(245,196,0,.15); border-color:rgba(245,196,0,.6); }
      .btn-charge { background:rgba(170,0,255,.2); border-color:rgba(170,0,255,.7); }
      .action-btn .btn-icon { font-size:var(--btn-icon); }
      .action-btn .btn-label { font-family:var(--font-head); font-size:7px; letter-spacing:1px; color:rgba(255,255,255,.65); }
      #toastHud { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); pointer-events:none; }
      .hud-toast { font-family:var(--font-head); font-size:14px; letter-spacing:3px; color:white; text-shadow:0 0 10px var(--accent); text-align:center; animation:toastPop 2s forwards; white-space:nowrap; position:absolute; }
      .hud-toast.xp { color:var(--accent); text-shadow:0 0 10px var(--accent); }
      .hud-toast.lvl { color:#00e676; font-size:20px; text-shadow:0 0 20px #00e676; }
      .hud-toast.dmg { color:var(--danger); }
      .hud-toast.heal { color:var(--hp); }
      @keyframes toastPop { 0%{opacity:0;transform:translateY(10px) scale(.8);} 15%{opacity:1;transform:translateY(-10px) scale(1);} 70%{opacity:1;transform:translateY(-20px);} 100%{opacity:0;transform:translateY(-30px);} }
      .dialog-box { position:absolute; bottom:180px; left:50%; transform:translateX(-50%); background:var(--ui-bg); border:1px solid #2a3560; border-radius:8px; padding:16px 18px; max-width:350px; width:92vw; backdrop-filter:blur(12px); pointer-events:auto; display:none; }
      .dialog-box.visible { display:block; }
      .dialog-name { font-family:var(--font-head); font-size:10px; letter-spacing:2px; color:var(--accent); margin-bottom:6px; }
      .dialog-text { font-size:15px; color:#c8cfe8; line-height:1.5; margin-bottom:10px; }
      .dialog-opts { display:flex; flex-direction:column; gap:8px; }
      .dialog-opt { background:rgba(74,106,255,.1); border:1px solid rgba(74,106,255,.3); border-radius:4px; padding:10px 12px; font-size:13px; color:#c8cfe8; cursor:pointer; transition:all .15s; min-height:44px; display:flex; align-items:center; touch-action:manipulation; }
      .dialog-opt:hover { background:rgba(74,106,255,.25); border-color:rgba(74,106,255,.6); }
      #levelUpOverlay { position:fixed; inset:0; display:none; align-items:center; justify-content:center; background:rgba(0,0,0,.75); z-index:50; pointer-events:auto; }
      #levelUpOverlay.visible { display:flex; }
      .levelup-panel { background:linear-gradient(135deg,#0d1020,#12172e); border:2px solid var(--accent); border-radius:12px; padding:30px; text-align:center; max-width:340px; width:90vw; box-shadow:0 0 40px rgba(245,196,0,.3); animation:levelUpPop .4s cubic-bezier(.175,.885,.32,1.275); }
      @keyframes levelUpPop { from{transform:scale(.5);opacity:0;} to{transform:scale(1);opacity:1;} }
      .levelup-title { font-family:var(--font-head); font-size:24px; letter-spacing:4px; color:var(--accent); text-shadow:0 0 20px var(--accent); margin-bottom:8px; }
      .levelup-sub { font-family:var(--font-head); font-size:10px; letter-spacing:2px; color:#8892b0; margin-bottom:20px; }
      .stat-gains { display:flex; flex-direction:column; gap:8px; margin-bottom:20px; }
      .stat-gain-row { display:flex; align-items:center; justify-content:space-between; font-size:14px; color:#c8cfe8; }
      .stat-gain-val { font-family:var(--font-head); font-size:12px; color:var(--hp); }
      .levelup-continue { padding:12px 36px; background:linear-gradient(135deg,#1b5e20,#388e3c); border:2px solid #4caf50; border-radius:6px; color:white; font-family:var(--font-head); font-size:12px; letter-spacing:2px; cursor:pointer; transition:all .2s; min-height:48px; touch-action:manipulation; }
      .levelup-continue:hover { box-shadow:0 0 15px rgba(76,175,80,.4); transform:translateY(-2px); }
      @media (pointer:coarse), (max-width:768px) { .mobile-controls{display:flex;} .skills-bar{display:none;} .db-counter{bottom:175px;right:12px;} .region-label{position:absolute;bottom:175px;left:50%;transform:translateX(-50%);} .dialog-box{bottom:185px;} .minimap-wrap{top:12px;right:12px;width:80px;height:80px;} .mission-box{top:110px;} }
      @media (pointer:fine) and (min-width:769px) { .mobile-controls{display:none !important;} .skills-bar{display:flex;} .db-counter{position:absolute;bottom:90px;right:12px;} .region-label{position:absolute;bottom:92px;left:50%;transform:translateX(-50%);} .dialog-box{bottom:120px;} }
      @media (max-width:420px) { :root{--btn-size:58px;--btn-icon:22px;} .joystick-wrap{width:110px;height:110px;} #joystickKnob{width:46px;height:46px;top:32px;left:32px;} .player-hud{min-width:155px;padding:6px 10px;} .player-name{font-size:10px;} }
      @media (max-height:460px) and (orientation:landscape) { :root{--btn-size:56px;--btn-icon:20px;} .mobile-controls{height:130px;padding:0 14px 10px;} .joystick-wrap{width:100px;height:100px;} #joystickKnob{width:42px;height:42px;top:29px;left:29px;} .hud-top{top:8px;} .player-hud{padding:5px 9px;min-width:150px;} .player-name{font-size:9px;margin-bottom:4px;} .bar-track{height:6px;} .enemy-hud{min-width:140px;padding:5px 9px;} .minimap-wrap{width:72px;height:72px;top:8px;right:8px;} .mission-box{display:none;} .db-counter{bottom:140px;right:8px;padding:5px 8px;} .db-icon{font-size:13px;} .db-count{font-size:10px;} .region-label{bottom:140px;font-size:8px;} .dialog-box{bottom:145px;} .action-btns{gap:8px;} .skill-btn{width:52px;height:52px;} }
      @media (min-width:769px) and (max-width:1200px) and (pointer:coarse) { :root{--btn-size:60px;--btn-icon:22px;} .mobile-controls{display:flex;height:150px;} .skills-bar{display:none;} .db-counter{bottom:160px;} .region-label{bottom:160px;} .dialog-box{bottom:165px;} }
    </style>
  </head>
  <body>
    <div id="screenLoading">
      <div class="screen-title">DRAGON WORLD Z</div>
      <div class="screen-sub">CARGANDO MUNDO...</div>
      <div class="loading-bar-wrap"><div class="loading-bar" id="loadBar"></div></div>
      <div class="loading-label" id="loadLabel">INICIALIZANDO MOTOR DE JUEGO</div>
    </div>
    <div id="screenDead">
      <div class="screen-title">CAÍSTE EN BATALLA</div>
      <div class="screen-sub">TU PODER NO FUE SUFICIENTE</div>
      <button id="respawnBtn" onclick="respawn()">⚡ CONTINUAR</button>
    </div>
    <canvas id="gameCanvas"></canvas>
    <div id="hud">
      <div class="hud-top">
        <div class="player-hud">
          <div class="player-name" id="hudPlayerName">GUERRERO Z</div>
          <div class="bar-row"><span class="bar-icon">❤️</span><div class="bar-track"><div class="bar-fill" id="barHp" style="width:100%"></div></div><span class="bar-val" id="valHp">100/100</span></div>
          <div class="bar-row"><span class="bar-icon">💧</span><div class="bar-track"><div class="bar-fill" id="barKi" style="width:100%"></div></div><span class="bar-val" id="valKi">100/100</span></div>
          <div class="level-badge"><span class="level-num" id="hudLevel">LV 1</span><div class="xp-track"><div class="xp-fill" id="xpFill" style="width:0%"></div></div></div>
        </div>
        <div class="enemy-hud" id="enemyHud">
          <div class="enemy-name" id="enemyName">ENEMY</div>
          <div class="bar-row"><span class="bar-icon">❤️</span><div class="bar-track"><div class="bar-fill" id="barEnemyHp" style="width:100%"></div></div><span class="bar-val" id="valEnemyHp">100/100</span></div>
        </div>
      </div>
      <div class="left-menu" id="leftMenu">
        <div class="left-menu-title">Menú</div>
        <button class="menu-btn" onclick="goBack()">← Regresar</button>
      </div>
      <div class="minimap-wrap" style="top:12px;right:120px;">
        <canvas id="minimapCanvas" width="90" height="90"></canvas>
        <div class="minimap-label">MAPA</div>
      </div>
      <div class="db-counter" style="bottom:90px;right:12px;"><span class="db-icon">🔮</span><span class="db-count" id="dbCount">0 / 7</span></div>
      <div class="mission-box" id="missionBox">
        <div class="mission-title">✦ MISIÓN ACTIVA</div>
        <div class="mission-text" id="missionText">Explora Capsule Corp</div>
        <div class="mission-progress" id="missionProgress"></div>
      </div>
      <div class="region-label" id="regionLabel" style="position:absolute;bottom:92px;left:50%;transform:translateX(-50%);">CAPSULE CORP</div>
      <div class="skills-bar" id="skillsBar">
        <div class="skill-btn" id="skillQ" onclick="useSkill('Q')"><span class="skill-icon">👊</span><span class="skill-key">Q/①</span><div class="skill-cd" id="cdQ"></div></div>
        <div class="skill-btn" id="skillE" onclick="useSkill('E')"><span class="skill-icon">💥</span><span class="skill-key">E/②</span><div class="skill-cd" id="cdE"></div></div>
        <div class="skill-btn" id="skillR" onclick="useSkill('R')"><span class="skill-icon">⚡</span><span class="skill-key">R/③</span><div class="skill-cd" id="cdR"></div></div>
        <div class="skill-btn" id="skillF" onclick="useSkill('F')"><span class="skill-icon">🌀</span><span class="skill-key">F/④</span><div class="skill-cd" id="cdF"></div></div>
      </div>
      <div class="mobile-controls">
        <div class="joystick-wrap" id="joystickWrap"><div id="joystickBase"></div><div id="joystickKnob"></div></div>
        <div class="action-btns">
          <div class="action-btn btn-attack" onclick="useSkill('Q')"><span class="btn-icon">👊</span><span class="btn-label">ATAQUE</span></div>
          <div class="action-btn btn-ki" onclick="useSkill('E')"><span class="btn-icon">💥</span><span class="btn-label">KI</span></div>
          <div class="action-btn btn-dash" onclick="useSkill('R')"><span class="btn-icon">⚡</span><span class="btn-label">DASH</span></div>
          <div class="action-btn btn-charge" onclick="useSkill('F')"><span class="btn-icon">🌀</span><span class="btn-label">CARGA</span></div>
        </div>
      </div>
      <div class="dialog-box" id="dialogBox">
        <div class="dialog-name" id="dialogName">NPC</div>
        <div class="dialog-text" id="dialogText"></div>
        <div class="dialog-opts" id="dialogOpts"></div>
      </div>
      <div id="toastHud"></div>
    </div>
    <div id="levelUpOverlay">
      <div class="levelup-panel">
        <div class="levelup-title">⬆ NIVEL UP!</div>
        <div class="levelup-sub" id="levelUpNum">NIVEL 2</div>
        <div class="stat-gains" id="levelUpStats"></div>
        <button class="levelup-continue" onclick="closeLevelUp()">CONTINUAR ▶</button>
      </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="character-system.js"></script>
    <script>
      "use strict";

      // ═══════════════════════════════════════════════════════════════
      //  FIREBASE CONFIG
      // ═══════════════════════════════════════════════════════════════
      const firebaseConfig = {
        apiKey: "AIzaSyBYZwK41XAUkLeRlWQRms0oEyJ1QXMQVg8",
        authDomain: "dragon-world-z.firebaseapp.com",
        databaseURL: "https://dragon-world-z-default-rtdb.firebaseio.com",
        projectId: "dragon-world-z",
        storageBucket: "dragon-world-z.firebasestorage.app",
        messagingSenderId: "994414993412",
        appId: "1:994414993412:web:66813401c499f41e46d551"
      };
      firebase.initializeApp(firebaseConfig);
      const db = firebase.database();

      // ═══════════════════════════════════════════════════════════════
      //  CANVAS SETUP
      // ═══════════════════════════════════════════════════════════════
      const canvas = document.getElementById("gameCanvas");
      const ctx = canvas.getContext("2d");
      const minimapCanvas = document.getElementById("minimapCanvas");
      const mmCtx = minimapCanvas.getContext("2d");

      function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
      resizeCanvas();
      window.addEventListener("resize", resizeCanvas);

      // ═══════════════════════════════════════════════════════════════
      //  MULTIPLAYER CON FIREBASE
      // ═══════════════════════════════════════════════════════════════
      const otherPlayers = {};
      // Cache de animadores para otros jugadores (para que tengan animación fluida)
      const otherPlayerAnimators = {};
      let myPlayerId = null;
      let mpConnected = false;
      let mpLastSend = 0;
      const MP_SEND_RATE = 80; // ms entre envíos (más rápido = más suave)
      const chatMessages = [];
      const MAX_CHAT_MSGS = 8;

      // Construye el objeto de apariencia completo del jugador local para enviar a Firebase
      function buildMyAppearancePayload() {
        const sc = savedChar || {};
        return {
          raceId:       sc.race        || "human",
          gender:       sc.gender      || "male",
          faceId:       sc.faceId      || null,
          faceColor:    sc.faceColor   || null,
          eyeColor:     sc.eyeColor    || "#3a2a1a",
          browColor:    sc.browColor   || null,
          pupilColor:   sc.pupilColor  || null,
          hairId:       sc.hair        || null,
          hairColor:    sc.hairColor   || "#1a1a1a",
          topId:        sc.shirt       || null,
          bottomId:     sc.pants       || null,
          shoesId:      sc.shoes       || null,
          glovesId:     sc.gloves      || null,
          skinColor:    sc.skinColor   || "#e8c898",
          auraId:       sc.aura        || "a0",
          auraColor:    sc.auraColor   || "#fdd835",
          accessoryId:  sc.accessory   || "ac_none",
          clothColor:   sc.clothColor  || "#ff6a00",
          hairColorAlt: sc.hairColorAlt|| null,
        };
      }

      function initMultiplayer() {
        myPlayerId = "player_" + Math.random().toString(36).substr(2, 9) + "_" + Date.now();
        const myRef = db.ref("players/" + myPlayerId);

        // Al desconectarse, eliminarse de Firebase
        myRef.onDisconnect().remove();

        mpConnected = true;
        showHudToast("🌐 Conectado!", "xp");
        updateMpHud();

        // Enviar datos iniciales completos (apariencia + posición + stats)
        myRef.set({
          name:       player.name,
          x:          Math.floor(player.x),
          y:          Math.floor(player.y),
          facing:     player.facing,
          animAction: "idle",
          race:       player.race,
          auraColor:  player.auraColor,
          charColor:  player.charColor,
          level:      player.level,
          hp:         player.hp,
          maxHp:      player.maxHp,
          appearance: buildMyAppearancePayload(),
          t:          Date.now()
        });

        // Escuchar a todos los jugadores en tiempo real
        db.ref("players").on("value", (snapshot) => {
          const allPlayers = snapshot.val() || {};
          // Limpiar jugadores que ya no están
          for (const id in otherPlayers) {
            if (!allPlayers[id]) {
              delete otherPlayers[id];
              delete otherPlayerAnimators[id];
            }
          }
          // Actualizar otros jugadores
          for (const [id, data] of Object.entries(allPlayers)) {
            if (id === myPlayerId) continue;
            if (Date.now() - (data.t || 0) > 10000) {
              delete otherPlayers[id];
              delete otherPlayerAnimators[id];
              continue;
            }
            const prev = otherPlayers[id];
            otherPlayers[id] = data;

            // Crear/actualizar el animador de ese jugador remoto
            if (!otherPlayerAnimators[id]) {
              const CS = window.CharacterSystem;
              if (CS) otherPlayerAnimators[id] = new CS.SpriteAnimator("idle");
            }
            // Sincronizar acción de animación
            if (otherPlayerAnimators[id] && data.animAction) {
              otherPlayerAnimators[id].play(data.animAction);
            }
          }
          updateMpHud();
        });

        // Escuchar chat (solo mensajes nuevos)
        db.ref("chat").limitToLast(1).on("child_added", (snapshot) => {
          const msg = snapshot.val();
          if (!msg || msg.id === myPlayerId) return;
          addChatMessage(msg.name, msg.text, "#00e5ff");
        });
      }

      function sendPlayerUpdate() {
        if (!mpConnected || !myPlayerId) return;
        const now = performance.now();
        if (now - mpLastSend < MP_SEND_RATE) return;
        mpLastSend = now;

        let animAction = "idle";
        if (player.attacking) animAction = "attack_1";
        else if (player.dashing) animAction = "run";
        else if (player.moving) animAction = "walk";
        else if (player.charging) animAction = "ki_charge";

        // Actualización frecuente: solo datos que cambian en runtime
        db.ref("players/" + myPlayerId).update({
          x:          Math.floor(player.x),
          y:          Math.floor(player.y),
          facing:     player.facing,
          animAction,
          hp:         player.hp,
          level:      player.level,
          t:          Date.now()
        });
      }

      // ─── Dibujar otros jugadores usando CharacterSystem si está disponible ───
      function drawOtherPlayers() {
        const CS = window.CharacterSystem;
        const now = performance.now();

        for (const [id, p] of Object.entries(otherPlayers)) {
          const sx = p.x - cam.x;
          const sy = p.y - cam.y;
          if (sx < -100 || sx > canvas.width + 100 || sy < -120 || sy > canvas.height + 120) continue;

          // Actualizar animador con el timestamp actual
          const anim = otherPlayerAnimators[id];
          if (anim) anim.update(now);

          // ── Intentar dibujar con CharacterSystem completo ──
          if (CS && csImageMap && anim && p.appearance) {
            try {
              const app = p.appearance;
              // Construir objeto appearance compatible con CS
              const remoteAppearance = {
                raceId:      app.raceId      || "human",
                gender:      app.gender      || "male",
                faceId:      app.faceId      || null,
                faceColor:   app.faceColor   || null,
                eyeColor:    app.eyeColor    || "#3a2a1a",
                browColor:   app.browColor   || null,
                pupilColor:  app.pupilColor  || null,
                hairId:      app.hairId      || null,
                hairColor:   app.hairColor   || "#1a1a1a",
                topId:       app.topId       || null,
                bottomId:    app.bottomId    || null,
                shoesId:     app.shoesId     || null,
                glovesId:    app.glovesId    || null,
                skinColor:   app.skinColor   || "#e8c898",
                auraId:      app.auraId      || "a0",
                auraColor:   app.auraColor   || "#fdd835",
                accessoryId: app.accessoryId || "ac_none",
              };
              // Construir objeto csPlayer temporal para el jugador remoto
              const remoteCSPlayer = {
                appearance: remoteAppearance,
                direction:  (p.facing || 1),
              };
              const remoteState = {
                glovesId:    remoteAppearance.glovesId  || "gm0",
                auraId:      remoteAppearance.auraId    || "a0",
                auraColor:   remoteAppearance.auraColor || "#fdd835",
                accessoryId: remoteAppearance.accessoryId || "ac_none",
                auraPhase:   (now * 0.003) % (Math.PI * 2),
                viewKey:     null,
              };

              // Sombra en el suelo
              ctx.fillStyle = "rgba(0,0,0,0.3)";
              ctx.beginPath();
              ctx.ellipse(sx, sy + 3, 16, 5, 0, 0, Math.PI * 2);
              ctx.fill();

              // Dibujar sprite completo del personaje remoto
              ctx.save();
              const scaleX = SPRITE_DRAW_W / CS.FRAME_W;
              const scaleY = SPRITE_DRAW_H / CS.FRAME_H;
              ctx.translate(sx, sy);
              ctx.scale(scaleX, scaleY);
              ctx.translate(-sx, -sy);
              ctx.imageSmoothingEnabled = true;
              CS.drawPlayer(ctx, sx, sy, remoteCSPlayer, csImageMap, anim, remoteState);
              ctx.restore();

              // Etiqueta de nombre
              _drawRemotePlayerLabel(p, sx, sy);
              continue; // éxito con CS, no hace falta el fallback
            } catch (e) {
              // Si CS falla, cae al fallback geométrico
            }
          }

          // ── Fallback: dibujo geométrico si CS no disponible ──
          _drawRemotePlayerFallback(p, sx, sy);
        }
      }

      function _drawRemotePlayerLabel(p, sx, sy) {
        ctx.save();
        ctx.font = "bold 9px Orbitron, monospace";
        ctx.textAlign = "center";
        const nameText = (p.name || "?") + (p.level ? ` Lv.${p.level}` : "");
        const nameWidth = ctx.measureText(nameText).width + 10;
        ctx.fillStyle = "rgba(8,9,15,0.8)";
        ctx.fillRect(sx - nameWidth / 2, sy - SPRITE_DRAW_H - 18, nameWidth, 16);
        ctx.fillStyle = (p.appearance?.auraColor) || (p.charColor) || "#00e5ff";
        ctx.fillText(nameText, sx, sy - SPRITE_DRAW_H - 6);
        // Barra de vida
        const barW = 44;
        const hpPct = Math.max(0, Math.min(1, (p.hp || 1) / (p.maxHp || 1)));
        ctx.fillStyle = "#1a1a1a";
        ctx.fillRect(sx - barW / 2, sy - SPRITE_DRAW_H - 22, barW, 4);
        ctx.fillStyle = hpPct > 0.5 ? "#00e676" : "#ff1744";
        ctx.fillRect(sx - barW / 2, sy - SPRITE_DRAW_H - 22, barW * hpPct, 4);
        ctx.restore();
      }

      function _drawRemotePlayerFallback(p, sx, sy) {
        const color = (p.appearance?.auraColor) || p.charColor || "#00e5ff";
        const skinColor = p.appearance?.skinColor || "#e8c898";
        const clothColor = p.appearance?.clothColor || "#ff6a00";
        const hairColor = p.appearance?.hairColor || "#1a1a1a";

        // Sombra
        ctx.fillStyle = "rgba(0,0,0,0.3)";
        ctx.beginPath();
        ctx.ellipse(sx, sy + 3, 16, 5, 0, 0, Math.PI * 2);
        ctx.fill();

        ctx.save();
        if ((p.facing || 1) === -1) { ctx.translate(sx * 2, 0); ctx.scale(-1, 1); }

        // Piernas
        ctx.fillStyle = clothColor;
        ctx.fillRect(sx - 7, sy - 16, 7, 18);
        ctx.fillRect(sx + 1, sy - 16, 7, 18);
        // Botas
        ctx.fillStyle = "#1a1a1a";
        ctx.fillRect(sx - 8, sy + 2, 8, 6);
        ctx.fillRect(sx + 1, sy + 2, 8, 6);
        // Torso
        ctx.fillStyle = color;
        ctx.fillRect(sx - 10, sy - 36, 20, 22);
        // Brazos
        ctx.fillStyle = skinColor;
        ctx.fillRect(sx - 16, sy - 36, 7, 16);
        ctx.fillRect(sx + 9, sy - 36, 7, 16);
        // Cabeza
        ctx.beginPath();
        ctx.arc(sx, sy - 44, 10, 0, Math.PI * 2);
        ctx.fill();
        // Pelo
        ctx.fillStyle = hairColor;
        ctx.beginPath();
        ctx.arc(sx, sy - 50, 9, Math.PI, Math.PI * 2);
        ctx.fill();

        ctx.restore();
        _drawRemotePlayerLabel(p, sx, sy);
      }

      function addChatMessage(name, text, color) {
        chatMessages.push({ name, text, color: color || "#e8eaf6", time: performance.now() });
        if (chatMessages.length > MAX_CHAT_MSGS) chatMessages.shift();

      function buildMpHud() {

        panel.style.cssText = `position:absolute;top:110px;left:12px;width:200px;background:rgba(8,9,15,0.88);border:1px solid #2a3560;border-radius:8px;padding:10px 12px;backdrop-filter:blur(8px);z-index:9;pointer-events:auto;`;

            <button onclick="sendChatMsg()" style="background:rgba(0,229,255,.15);border:1px solid #00e5ff;border-radius:4px;color:#00e5ff;font-size:10px;padding:4px 8px;cursor:pointer;font-family:'Orbitron',monospace;pointer-events:auto;">➤</button>

      // ═══════════════════════════════════════════════════════════════

      const TILE = 48, WORLD_W = 120, WORLD_H = 80, CAM_LERP = 0.12;

      // ═══════════════════════════════════════════════════════════════
      //  CARGA DE PERSONAJE DESDE LOCALSTORAGE
      // ═══════════════════════════════════════════════════════════════
      function loadCharacterData() {
        let slot = 0;
        try {
          const qs = new URLSearchParams(window.location.search);
          const rawSlot = qs.get("slot");
          if (rawSlot != null) slot = parseInt(rawSlot, 10);
          else { const rawActive = localStorage.getItem("dragonCreatorZ_activeSlot"); if (rawActive != null) slot = parseInt(rawActive, 10); }
        } catch(e) {}
        if (!Number.isFinite(slot)) slot = 0;
        slot = Math.max(0, Math.min(2, slot));
        try {
          const raw = localStorage.getItem("dragonCreatorZ_slots");
          if (raw) {
            const slots = JSON.parse(raw);
            const d = Array.isArray(slots) ? slots[slot] : null;
            if (d && d.name) return d;
            if (Array.isArray(slots)) { const any = slots.find(s => s && s.name); if (any) return any; }
          }
        } catch(e) {}
        for (let i = 0; i < 3; i++) {
          try { const raw = localStorage.getItem(`dragonCreatorZ_slot_${i}`); if (raw) { const d = JSON.parse(raw); if (d && d.name) return d; } } catch(e) {}
        }
        return null;
      }

      function loadCharacterSprite() {
        let slot = 0;
        try {
          const qs = new URLSearchParams(window.location.search);
          const rawSlot = qs.get("slot");
          if (rawSlot != null) slot = parseInt(rawSlot, 10);
          else { const raw = localStorage.getItem("dragonCreatorZ_activeSlot"); if (raw != null) slot = parseInt(raw, 10); }
        } catch(e) {}
        slot = Math.max(0, Math.min(2, isNaN(slot) ? 0 : slot));
        const b64 = localStorage.getItem(`dragonCreatorZ_sprite_${slot}`);
        if (!b64) return null;
        const img = new Image(); img.src = b64; return img;
      }

      const RACE_BONUS = {

      const cam = { x:0, y:0, tx:0, ty:0 };

      window.addEventListener("touchmove", (e) => { e.preventDefault(); if (!joystick.active) return; const t = e.touches[0]; const dx = t.clientX - joystick.startX, dy = t.clientY - joystick.startY; const maxR = 40, dist = Math.sqrt(dx*dx + dy*dy); const nx = dist > maxR ? (dx/dist)*maxR : dx, ny = dist > maxR ? (dy/dist)*maxR : dy; joystick.dx = nx/maxR; joystick.dy = ny/maxR; jk.style.transform = `translate(${nx}px,${ny}px)`; }, { passive:false });
      window.addEventListener("touchend", () => { if (!joystick.active) return; joystick.active = false; joystick.dx = 0; joystick.dy = 0; jk.style.transform = "translate(0,0)"; });

      const cooldowns = { Q:0, E:0, R:0, F:0 };

      const TILE_COLORS = { 0:"#2d5a27",1:"#1565c0",2:"#616161",3:"#c9a84c",4:"#e8eaf6",5:"#08090f",6:"#4a4a4a",7:"#1a3a18",8:"#8d6e63" };

      // ═══════════════════════════════════════════════════════════════
      //  WORLD GENERATION
      // ═══════════════════════════════════════════════════════════════
      const worldMap = [];
      function generateWorld() {
        for (let y=0;y<WORLD_H;y++){worldMap[y]=[];for(let x=0;x<WORLD_W;x++)worldMap[y][x]=0;}
        for(let x=50;x<75;x++){worldMap[35][x]=6;worldMap[36][x]=6;}
        for(let y=30;y<50;y++){worldMap[y][60]=6;worldMap[y][61]=6;}
        for(let y=25;y<55;y++)for(let x=85;x<120;x++)worldMap[y][x]=3;
        for(let y=0;y<20;y++)for(let x=30;x<90;x++)if(Math.sin(x*.3)*Math.cos(y*.4)>.1)worldMap[y][x]=2;
        for(let y=30;y<60;y++)for(let x=0;x<20;x++)worldMap[y][x]=1;
        for(let y=40;y<48;y++)for(let x=35;x<48;x++)worldMap[y][x]=1;
        for(let y=0;y<10;y++)for(let x=0;x<120;x++)worldMap[y][x]=4;
        for(let y=55;y<80;y++)for(let x=0;x<55;x++)if((x+y)%3!==0)worldMap[y][x]=7;
        for(let y=18;y<45;y++){const rx=Math.floor(22+Math.sin(y*.2)*4);worldMap[y][rx]=1;worldMap[y][rx+1]=1;}
      }
      generateWorld();

      function isWalkable(tx,ty){ if(tx<0||ty<0||tx>=WORLD_W||ty>=WORLD_H)return false; const t=worldMap[ty]?.[tx]; return t!==1&&t!==5; }

      const REGIONS = [

      function useSkill(key){

        if(skill.type==="melee"){
          player.attacking=true;player.attackTimer=.35;player.attackType="melee";cooldowns[key]=maxCd[key];
          enemies.forEach(e=>{if(e.state==="dead")return;if(Math.hypot(e.x-player.x,e.y-player.y)<70){const dmg=Math.floor(player.strength*skill.dmgMult*(.8+Math.random()*.4));hitEnemy(e,dmg);spawnExplosion(e.x,e.y,"#ff6a00",8);}});
          spawnExplosion(player.x+player.facing*30,player.y,"#ff6a00",6);

          player.ki=Math.max(0,player.ki-skill.kiCost);cooldowns[key]=maxCd[key];

      function hitEnemy(e,dmg){ const actualDmg=Math.max(1,dmg-Math.floor(e.def||0)); e.hp-=actualDmg;showHudToast(`-${actualDmg}`,"dmg"); e.state="hurt";e.stateTimer=.2; combatEffects.push({x:e.x,y:e.y-e.h/2,text:`-${actualDmg}`,timer:1.0,color:"#ff1744"}); if(e.hp<=0)killEnemy(e); updateEnemyHud(e); }
      function hitPlayer(dmg){ if(player.invincible)return; const defense=Math.floor(player.defense*.5); const actual=Math.max(1,dmg-defense); player.hp=Math.max(0,player.hp-actual); showHudToast(`-${actual}`,"dmg"); player.invincible=true;player.invTimer=.8; combatEffects.push({x:player.x,y:player.y-30,text:`-${actual}`,timer:1.0,color:"#ff1744"}); updatePlayerHud(); if(player.hp<=0)playerDied(); }
      function killEnemy(e){ e.state="dead"; const xp=Math.floor(e.reward.xp*(1+(e.level-1)*.5)); giveXp(xp);player.ki=Math.min(player.maxKi,player.ki+e.reward.ki); spawnExplosion(e.x,e.y,e.color,16); combatEffects.push({x:e.x,y:e.y-20,text:`+${xp} XP`,timer:1.5,color:"#f5c400"}); setTimeout(()=>{e.hp=e.maxHp;e.state="idle";e.x=e.spawnX;e.y=e.spawnY;},20000); updatePlayerHud(); }
      function giveXp(amount){ player.xp+=amount; while(player.xp>=player.xpToNext){player.xp-=player.xpToNext;levelUp();} updatePlayerHud(); }
      function levelUp(){ player.level++; player.xpToNext=Math.floor(100*Math.pow(1.4,player.level-1)); const gains={hp:Math.floor(raceStats.health*1.5),ki:Math.floor(raceStats.ki*1.2),str:Math.floor(raceStats.strength*.08),def:Math.floor(raceStats.defense*.08)}; player.maxHp+=gains.hp;player.maxKi+=gains.ki; player.hp=player.maxHp;player.ki=player.maxKi; player.strength+=gains.str;player.defense+=gains.def; player.speed=Math.min(player.speed+.05,5); showLevelUp(player.level,gains);updatePlayerHud(); }
      function showLevelUp(level,gains){ document.getElementById("levelUpNum").textContent=`NIVEL ${level}`; document.getElementById("levelUpStats").innerHTML=`<div class="stat-gain-row">❤️ Vida máx <span class="stat-gain-val">+${gains.hp}</span></div><div class="stat-gain-row">💧 Ki máx <span class="stat-gain-val">+${gains.ki}</span></div><div class="stat-gain-row">💥 Fuerza <span class="stat-gain-val">+${gains.str}</span></div><div class="stat-gain-row">🛡️ Defensa <span class="stat-gain-val">+${gains.def}</span></div>`; document.getElementById("levelUpOverlay").classList.add("visible"); gameState="levelup";showHudToast("¡NIVEL UP!","lvl"); }

      // ═══════════════════════════════════════════════════════════════
      //  ENEMY AI
      // ═══════════════════════════════════════════════════════════════
      function updateEnemy(e,dt){ if(e.state==="dead")return; const dx=player.x-e.x,dy=player.y-e.y; const dist=Math.hypot(dx,dy); e.attackCdTimer=Math.max(0,e.attackCdTimer-dt); e.stateTimer=Math.max(0,e.stateTimer-dt); e.animTimer+=dt; if(e.animTimer>.15){e.animTimer=0;e.animFrame=(e.animFrame+1)%4;} if(e.state==="hurt"&&e.stateTimer>0)return; if(dist<e.detectionRange&&gameState==="playing")e.state="chase"; else if(dist>e.detectionRange*1.5){ e.state="idle"; const sdx=e.spawnX-e.x,sdy=e.spawnY-e.y; if(Math.hypot(sdx,sdy)>80){e.x+=sdx*dt*.8;e.y+=sdy*dt*.8;} } if(e.state==="chase"){ if(dist>e.attackRange){ e.vx=(dx/dist)*e.spd;e.vy=(dy/dist)*e.spd;e.facing=dx>0?1:-1; const nx=e.x+e.vx,ny=e.y+e.vy; const tx1=Math.floor((nx-e.w/2)/TILE),ty1=Math.floor((ny-e.h/2)/TILE); const tx2=Math.floor((nx+e.w/2)/TILE),ty2=Math.floor((ny+e.h/2)/TILE); if(isWalkable(tx1,ty1)&&isWalkable(tx2,ty1)&&isWalkable(tx1,ty2)&&isWalkable(tx2,ty2)){e.x=nx;e.y=ny;} }else{ if(e.attackCdTimer<=0){ e.attackCdTimer=e.attackCd;hitPlayer(e.str);spawnExplosion(player.x,player.y-10,"#ff1744",6); if(e.type==="ginyu"){ const angle=Math.atan2(dy,dx); projectiles.push({x:e.x,y:e.y,vx:Math.cos(angle)*4,vy:Math.sin(angle)*4,color:"#e040fb",dmg:Math.floor(e.str*1.5),life:2,w:10,h:10,fromPlayer:false}); } } } }else if(e.ai==="patrol"||e.state==="idle"){ e.patrolTimer+=dt; if(e.patrolTimer>2){e.patrolTimer=0;e.patrolDx*=-1;} const nx=e.x+e.patrolDx; if(isWalkable(Math.floor(nx/TILE),Math.floor(e.y/TILE)))e.x=nx; e.facing=e.patrolDx>0?1:-1; } }

      // ═══════════════════════════════════════════════════════════════
      //  PLAYER UPDATE
      // ═══════════════════════════════════════════════════════════════
      function updatePlayer(dt){ if(gameState!=="playing")return; let mx=0,my=0; if(keys["ArrowLeft"]||keys["KeyA"])mx-=1; if(keys["ArrowRight"]||keys["KeyD"])mx+=1; if(keys["ArrowUp"]||keys["KeyW"])my-=1; if(keys["ArrowDown"]||keys["KeyS"])my+=1; if(joystick.active){mx=joystick.dx;my=joystick.dy;} if(mx!==0||my!==0){const len=Math.sqrt(mx*mx+my*my);mx/=len;my/=len;} player.moving=mx!==0||my!==0; if(mx!==0)player.facing=mx>0?1:-1; if(player.charging){player.ki=Math.min(player.maxKi,player.ki+dt*25);player.auraActive=true;updatePlayerHud();} else{player.ki=Math.min(player.maxKi,player.ki+dt*3);} if(player.dashing){player.dashTimer-=dt;if(player.dashTimer<=0){player.dashing=false;player.invincible=false;}player.vx=player.dashVx;player.vy=player.dashVy;} else{player.vx=mx*player.speed;player.vy=my*player.speed;} if(player.attacking){player.attackTimer-=dt;if(player.attackTimer<=0)player.attacking=false;} if(player.invincible){player.invTimer-=dt;if(player.invTimer<=0)player.invincible=false;} const CS = window.CharacterSystem; if(CS&&csAnimator){ CS.player.direction=player.facing; if(player.attacking)csAnimator.play("attack_1"); else if(player.dashing)csAnimator.play("run"); else if(player.moving)csAnimator.play("walk"); else if(player.charging)csAnimator.play("ki_charge"); else csAnimator.play("idle"); } for(const k in cooldowns){ cooldowns[k]=Math.max(0,cooldowns[k]-dt); const cdEl=document.getElementById(`cd${k}`); if(cdEl){ if(cooldowns[k]>0){cdEl.classList.add("active");cdEl.textContent=cooldowns[k].toFixed(1);} else{cdEl.classList.remove("active");cdEl.textContent="";} } } const nx=player.x+player.vx,ny=player.y+player.vy; const hw=player.w/2,hh=player.h/2; const cx1=Math.floor((nx-hw)/TILE),cx2=Math.floor((nx+hw)/TILE); const cy1=Math.floor((ny-hh*.3)/TILE),cy2=Math.floor((ny+hh*.5)/TILE); if(isWalkable(cx1,cy1)&&isWalkable(cx2,cy1)&&isWalkable(cx1,cy2)&&isWalkable(cx2,cy2)){player.x=nx;player.y=ny;} else{ const cx1c=Math.floor((player.x-hw)/TILE),cx2c=Math.floor((player.x+hw)/TILE); const cy1c=Math.floor((player.y-hh*.3)/TILE),cy2c=Math.floor((player.y+hh*.5)/TILE); if(isWalkable(Math.floor((nx-hw)/TILE),cy1c)&&isWalkable(Math.floor((nx+hw)/TILE),cy1c)&&isWalkable(Math.floor((nx-hw)/TILE),cy2c)&&isWalkable(Math.floor((nx+hw)/TILE),cy2c))player.x=nx; if(isWalkable(cx1c,Math.floor((ny-hh*.3)/TILE))&&isWalkable(cx2c,Math.floor((ny-hh*.3)/TILE))&&isWalkable(cx1c,Math.floor((ny+hh*.5)/TILE))&&isWalkable(cx2c,Math.floor((ny+hh*.5)/TILE)))player.y=ny; } player.x=Math.max(TILE,Math.min(player.x,(WORLD_W-1)*TILE)); player.y=Math.max(TILE,Math.min(player.y,(WORLD_H-1)*TILE)); player.auraPhase+=dt*3; player.animTimer+=dt; let fps=8,frames=4; if(player.attacking){fps=14;frames=4;}else if(player.dashing){fps=16;frames=3;}else if(player.moving){fps=10;frames=6;}else if(player.charging){fps=6;frames=4;} if(player.animTimer>=1/fps){player.animTimer=0;player.animFrame=(player.animFrame+1)%frames;} const region=getRegion(player.x,player.y); if(region.name!==currentRegion){currentRegion=region.name;document.getElementById("regionLabel").textContent=region.name;} checkDragonBalls(); }

      function updateProjectiles(dt){ projectiles=projectiles.filter(p=>{ p.x+=p.vx;p.y+=p.vy;p.life-=dt; if(p.life<=0)return false; if(!isWalkable(Math.floor(p.x/TILE),Math.floor(p.y/TILE))){spawnExplosion(p.x,p.y,p.color,6);return false;} if(p.fromPlayer){for(const e of enemies){if(e.state==="dead")continue;if(Math.abs(p.x-e.x)<e.w&&Math.abs(p.y-e.y)<e.h){hitEnemy(e,p.dmg);spawnExplosion(p.x,p.y,p.color,8);return false;}}} else{if(Math.abs(p.x-player.x)<player.w&&Math.abs(p.y-player.y)<player.h){hitPlayer(p.dmg);spawnExplosion(p.x,p.y,p.color,6);return false;}} return true; }); }

      function updateCamera(){ cam.tx=player.x-canvas.width/2;cam.ty=player.y-canvas.height/2; cam.tx=Math.max(0,Math.min(cam.tx,WORLD_W*TILE-canvas.width)); cam.ty=Math.max(0,Math.min(cam.ty,WORLD_H*TILE-canvas.height)); cam.x+=(cam.tx-cam.x)*CAM_LERP;cam.y+=(cam.ty-cam.y)*CAM_LERP; }

      // ═══════════════════════════════════════════════════════════════
      //  DRAW FUNCTIONS
      // ═══════════════════════════════════════════════════════════════
      function drawWorld(){ const startX=Math.floor(cam.x/TILE),startY=Math.floor(cam.y/TILE); const endX=Math.min(WORLD_W,startX+Math.ceil(canvas.width/TILE)+2); const endY=Math.min(WORLD_H,startY+Math.ceil(canvas.height/TILE)+2); for(let ty=startY;ty<endY;ty++)for(let tx=startX;tx<endX;tx++){ const tile=worldMap[ty]?.[tx]??0; const color=TILE_COLORS[tile]||"#2d5a27"; const sx=tx*TILE-cam.x,sy=ty*TILE-cam.y; ctx.fillStyle=color;ctx.fillRect(sx,sy,TILE+1,TILE+1); if(tile===0||tile===7){ctx.fillStyle=tile===7?"rgba(0,0,0,0.15)":"rgba(255,255,255,0.04)";if((tx+ty)%3===0)ctx.fillRect(sx+8,sy+8,4,4);if((tx*ty)%5===0)ctx.fillRect(sx+30,sy+20,3,6);} else if(tile===3){ctx.strokeStyle="rgba(255,255,255,0.06)";ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(sx+4,sy+24);ctx.bezierCurveTo(sx+16,sy+18,sx+32,sy+30,sx+44,sy+24);ctx.stroke();} else if(tile===1){ctx.fillStyle=`rgba(255,255,255,${.05+.03*Math.sin(Date.now()*.002+tx+ty)})`;ctx.fillRect(sx+4,sy+16,TILE-8,6);} else if(tile===2){ctx.strokeStyle="rgba(0,0,0,0.2)";ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(sx+10,sy+10);ctx.lineTo(sx+20,sy+22);ctx.stroke();ctx.beginPath();ctx.moveTo(sx+30,sy+8);ctx.lineTo(sx+38,sy+18);ctx.stroke();} } drawWorldObjects(); }

      function drawWorldObjects(){ const buildings=[{tx:58,ty:34,w:3*TILE,h:2*TILE,color:"#1565c0",label:"CAPSULE CORP",accent:"#00e5ff"},{tx:64,ty:34,w:2*TILE,h:2*TILE,color:"#1a237e",label:"HANGAR",accent:"#4a6aff"},{tx:56,ty:37,w:2*TILE,h:2*TILE,color:"#212121",label:"LABORATORIO",accent:"#9e9e9e"},]; buildings.forEach(b=>{ const sx=b.tx*TILE-cam.x,sy=b.ty*TILE-cam.y; if(sx>-200&&sx<canvas.width+200&&sy>-200&&sy<canvas.height+200){ ctx.fillStyle="rgba(0,0,0,0.3)";ctx.fillRect(sx+6,sy+6,b.w,b.h); ctx.fillStyle=b.color;ctx.fillRect(sx,sy,b.w,b.h); ctx.fillStyle=b.accent;ctx.fillRect(sx,sy,b.w,6); ctx.fillStyle="rgba(0,229,255,0.3)"; for(let wy=1;wy<=2;wy++)for(let wx=1;wx<=3;wx++){const wpx=sx+wx*(b.w/4)-5,wpy=sy+wy*(b.h/3)-5;if(wpx>sx+4&&wpy>sy+10)ctx.fillRect(wpx,wpy,10,10);} ctx.fillStyle="rgba(255,255,255,0.7)";ctx.font="bold 8px Orbitron,monospace";ctx.textAlign="center";ctx.fillText(b.label,sx+b.w/2,sy-4); } }); [[20,60],[25,65],[15,68],[35,62],[10,70],[45,66],[30,75]].forEach(([tx,ty])=>{ const sx=tx*TILE-cam.x+TILE/2,sy=ty*TILE-cam.y+TILE/2; if(sx>-40&&sx<canvas.width+40&&sy>-40&&sy<canvas.height+40){ ctx.fillStyle="#5d4037";ctx.fillRect(sx-4,sy-4,8,18); ctx.fillStyle="#1b5e20";ctx.beginPath();ctx.arc(sx,sy-10,16,0,Math.PI*2);ctx.fill(); ctx.fillStyle="#2e7d32";ctx.beginPath();ctx.arc(sx-5,sy-14,10,0,Math.PI*2);ctx.fill(); } }); [[40,12],[50,10],[60,8],[70,12],[80,10]].forEach(([tx,ty])=>{ const sx=tx*TILE-cam.x+TILE/2,sy=ty*TILE-cam.y+TILE/2; if(sx>-100&&sx<canvas.width+100&&sy>-100&&sy<canvas.height+100){ ctx.fillStyle="#37474f";ctx.beginPath();ctx.moveTo(sx-30,sy+20);ctx.lineTo(sx,sy-40);ctx.lineTo(sx+30,sy+20);ctx.fill(); ctx.fillStyle="#eceff1";ctx.beginPath();ctx.moveTo(sx-10,sy-20);ctx.lineTo(sx,sy-40);ctx.lineTo(sx+10,sy-20);ctx.fill(); } }); }

      function drawDragonBalls(){ dragonBallObjects.forEach(db=>{ if(db.collected)return; const sx=db.x-cam.x,sy=db.y-cam.y; if(sx<-20||sx>canvas.width+20||sy<-20||sy>canvas.height+20)return; db.phase+=.04;const bob=Math.sin(db.phase)*4; const grd=ctx.createRadialGradient(sx,sy+bob,0,sx,sy+bob,18); grd.addColorStop(0,"rgba(255,214,0,0.6)");grd.addColorStop(1,"rgba(255,100,0,0)"); ctx.fillStyle=grd;ctx.beginPath();ctx.arc(sx,sy+bob,18,0,Math.PI*2);ctx.fill(); const ballGrd=ctx.createRadialGradient(sx-3,sy+bob-3,1,sx,sy+bob,10); ballGrd.addColorStop(0,"#fff8a0");ballGrd.addColorStop(.5,"#ffd600");ballGrd.addColorStop(1,"#ff6f00"); ctx.fillStyle=ballGrd;ctx.beginPath();ctx.arc(sx,sy+bob,10,0,Math.PI*2);ctx.fill(); ctx.fillStyle="#e53935"; for(let i=0;i<db.id;i++){const a=(i/Math.max(db.id,1))*Math.PI*2,r=i===0?0:5;ctx.beginPath();ctx.arc(sx+Math.cos(a)*r,sy+bob+Math.sin(a)*r,1.5,0,Math.PI*2);ctx.fill();} }); }

      function drawNpcs(){ npcs.forEach(npc=>{ const sx=npc.x-cam.x,sy=npc.y-cam.y; if(sx<-40||sx>canvas.width+40||sy<-40||sy>canvas.height+40)return; const t=Date.now()*.003; ctx.shadowColor=npc.color;ctx.shadowBlur=10; ctx.fillStyle="rgba(0,0,0,0.3)";ctx.beginPath();ctx.ellipse(sx,sy+4,12,4,0,0,Math.PI*2);ctx.fill(); ctx.fillStyle=npc.color;ctx.fillRect(sx-8,sy-24,16,28);ctx.beginPath();ctx.arc(sx,sy-28,10,0,Math.PI*2);ctx.fill(); ctx.shadowBlur=0; const dist=Math.hypot(npc.x-player.x,npc.y-player.y); if(dist<80){ctx.fillStyle=`rgba(245,196,0,${.5+.5*Math.sin(t*4)})`;ctx.font="bold 12px Orbitron,monospace";ctx.textAlign="center";ctx.fillText("[Z]",sx,sy-44+Math.sin(t*3)*3);} ctx.fillStyle="rgba(255,255,255,0.8)";ctx.font="bold 9px Orbitron,monospace";ctx.textAlign="center";ctx.fillText(npc.name,sx,sy-38); }); }

      function drawEnemies(){ enemies.forEach(e=>{ if(e.state==="dead")return; const sx=e.x-cam.x,sy=e.y-cam.y; if(sx<-60||sx>canvas.width+60||sy<-60||sy>canvas.height+60)return; const hurt=e.state==="hurt"; ctx.fillStyle="rgba(0,0,0,0.3)";ctx.beginPath();ctx.ellipse(sx,sy+e.h*.4,e.w*.5,e.h*.12,0,0,Math.PI*2);ctx.fill(); if(hurt&&Math.floor(Date.now()/80)%2===0)ctx.globalAlpha=.4; ctx.fillStyle=e.color; if(e.facing===-1){ctx.save();ctx.scale(-1,1);ctx.translate(-sx*2,0);} if(e.type==="ginyu"){ctx.fillRect(sx-e.w/2,sy-e.h,e.w,e.h);ctx.fillStyle="#880e4f";ctx.fillRect(sx-e.w/2,sy-e.h,e.w,e.h*.3);ctx.fillStyle=e.color;ctx.beginPath();ctx.arc(sx,sy-e.h-12,14,0,Math.PI*2);ctx.fill();} else{ctx.fillRect(sx-e.w/2,sy-e.h,e.w,e.h*.75);ctx.beginPath();ctx.arc(sx,sy-e.h*.85-8,e.w*.4,0,Math.PI*2);ctx.fill();} if(e.facing===-1)ctx.restore(); ctx.globalAlpha=1; const barW=e.w*1.4,barX=sx-barW/2,barY=sy-e.h-20; ctx.fillStyle="#1a1a1a";ctx.fillRect(barX,barY,barW,4); ctx.fillStyle=e.hp>e.maxHp*.5?"#f5c400":"#ff1744";ctx.fillRect(barX,barY,barW*(e.hp/e.maxHp),4); ctx.fillStyle="rgba(255,255,255,0.6)";ctx.font="7px Orbitron,monospace";ctx.textAlign="center";ctx.fillText(`Lv.${e.level}`,sx,barY-2); if(e.state==="chase"){ctx.fillStyle="#ff1744";ctx.font="14px sans-serif";ctx.fillText("!",sx,sy-e.h-22);} }); }

      function drawPlayerChar(){
        const sx=player.x-cam.x,sy=player.y-cam.y;
        const drawAttackFX=()=>{ if(!player.attacking)return; const attackX=player.facing===1?sx+SPRITE_DRAW_W*.6:sx-SPRITE_DRAW_W*.6; const attackY=sy-SPRITE_DRAW_H*.55; if(player.attackType==="ki"){ ctx.fillStyle=player.auraColor;ctx.shadowColor=player.auraColor;ctx.shadowBlur=18; ctx.beginPath();ctx.arc(attackX,attackY,13,0,Math.PI*2);ctx.fill(); ctx.fillStyle="rgba(255,255,255,0.8)";ctx.beginPath();ctx.arc(attackX,attackY,6,0,Math.PI*2);ctx.fill(); ctx.shadowBlur=0; }else{ ctx.strokeStyle=auraColor;ctx.lineWidth=3;ctx.shadowColor=auraColor;ctx.shadowBlur=12; ctx.beginPath();ctx.arc(attackX,attackY,16,-Math.PI/4,(Math.PI*3)/4);ctx.stroke(); ctx.shadowBlur=0;ctx.lineWidth=1; } };
        const CS = window.CharacterSystem;
        const useCS=CS&&csImageMap&&csAnimator&&Object.values(csImageMap).some(img=>img&&img.complete&&img.naturalWidth>0);
        if(useCS){ const csState={glovesId:CS.player.appearance.glovesId||"gm0",auraId:CS.player.appearance.auraId||"a0",auraColor:CS.player.appearance.auraColor||"#fdd835",accessoryId:CS.player.appearance.accessoryId||"ac_none",auraPhase:player.auraPhase||0,viewKey:null}; if(player.invincible&&Math.floor(Date.now()/100)%2===0)ctx.globalAlpha=.4; ctx.save(); const scaleX=SPRITE_DRAW_W/CS.FRAME_W,scaleY=SPRITE_DRAW_H/CS.FRAME_H; ctx.translate(sx,sy);ctx.scale(scaleX,scaleY);ctx.translate(-sx,-sy);ctx.imageSmoothingEnabled=true; CS.drawPlayer(ctx,sx,sy,CS.player,csImageMap,csAnimator,csState);ctx.restore(); ctx.globalAlpha=1;drawAttackFX();return; }
        if(playerSprite&&playerSprite.complete&&playerSprite.naturalWidth>0){ if(player.invincible&&Math.floor(Date.now()/100)%2===0)ctx.globalAlpha=.4; ctx.save(); const dx=sx-SPRITE_DRAW_W/2,dy=sy-SPRITE_DRAW_H; if(player.facing===-1){ctx.translate(sx,0);ctx.scale(-1,1);ctx.translate(-sx,0);} ctx.imageSmoothingEnabled=false;ctx.drawImage(playerSprite,dx,dy,SPRITE_DRAW_W,SPRITE_DRAW_H); ctx.restore();ctx.globalAlpha=1;drawAttackFX();return; }
        if(player.auraActive||player.charging){ const ac=player.auraColor; const r=parseInt(ac.slice(1,3),16),g=parseInt(ac.slice(3,5),16),b=parseInt(ac.slice(5,7),16); const grad=ctx.createRadialGradient(sx,sy-20,5,sx,sy-20,55); grad.addColorStop(0,`rgba(${r},${g},${b},0.55)`);grad.addColorStop(1,`rgba(${r},${g},${b},0)`); ctx.fillStyle=grad;ctx.beginPath();ctx.ellipse(sx,sy-20,55,65,0,0,Math.PI*2);ctx.fill(); for(let i=0;i<10;i++){ const angle=(i/10)*Math.PI*2+player.auraPhase; const fr=26+Math.sin(player.auraPhase*1.5+i)*9; const fx=sx+Math.cos(angle)*fr,fy=sy-20+Math.sin(angle)*fr*.5; const fh=14+Math.sin(player.auraPhase*2+i)*7; ctx.fillStyle=`rgba(${r},${g},${b},0.55)`;ctx.beginPath();ctx.moveTo(fx-2,fy+4);ctx.lineTo(fx,fy-fh);ctx.lineTo(fx+2,fy+4);ctx.fill(); } }
        ctx.fillStyle="rgba(0,0,0,0.35)";ctx.beginPath();ctx.ellipse(sx,sy+2,16,5,0,0,Math.PI*2);ctx.fill();
        if(player.invincible&&Math.floor(Date.now()/100)%2===0)ctx.globalAlpha=.4;
        if(player.facing===-1){ctx.save();ctx.scale(-1,1);ctx.translate(-sx*2,0);}
        const skinColor=savedChar?.skinColor||"#d4a574";
        const legOff=player.moving?Math.sin(player.animFrame*.8)*5:0;
        ctx.fillStyle=savedChar?.clothColor||"#ff6a00";ctx.fillRect(sx-7,sy-16,7,18+legOff);ctx.fillRect(sx+1,sy-16,7,18-legOff);
        ctx.fillStyle="#1a1a1a";ctx.fillRect(sx-8,sy+2,8,6);ctx.fillRect(sx+1,sy+2,8,6);
        ctx.fillStyle=charColor;ctx.fillRect(sx-10,sy-36,20,22);
        ctx.fillStyle=skinColor;ctx.fillRect(sx-16,sy-36,7,16);ctx.fillRect(sx+9,sy-36,7,16);
        ctx.beginPath();ctx.arc(sx,sy-44,10,0,Math.PI*2);ctx.fill();
        ctx.fillStyle=savedChar?.hairColor||"#1a1a1a";ctx.beginPath();ctx.arc(sx,sy-50,9,Math.PI,Math.PI*2);ctx.fill();
        ctx.fillStyle=savedChar?.eyeColor||"#1a1a1a";ctx.fillRect(sx-5,sy-46,3,3);ctx.fillRect(sx+2,sy-46,3,3);
        if(player.facing===-1)ctx.restore();
        ctx.globalAlpha=1;drawAttackFX();
      }

      function drawProjectiles(){ projectiles.forEach(p=>{ const sx=p.x-cam.x,sy=p.y-cam.y; ctx.shadowColor=p.color;ctx.shadowBlur=12;ctx.fillStyle=p.color; ctx.beginPath();ctx.arc(sx,sy,p.w/2,0,Math.PI*2);ctx.fill(); ctx.fillStyle="white";ctx.beginPath();ctx.arc(sx,sy,p.w/4,0,Math.PI*2);ctx.fill(); ctx.shadowBlur=0; spawnParticle(p.x-p.vx*2,p.y-p.vy*2,p.color,0,0,.15,4); }); }

      function drawParticles(dt){ particles=particles.filter(p=>{ p.life-=dt;if(p.life<=0)return false; p.x+=p.vx;p.y+=p.vy;p.vy+=.05;p.alpha=p.life/p.maxLife; const sx=p.x-cam.x,sy=p.y-cam.y; ctx.globalAlpha=p.alpha;ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(sx,sy,p.size*p.alpha,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1; return true; }); }

      function drawCombatEffects(dt){ combatEffects=combatEffects.filter(e=>{ e.timer-=dt;if(e.timer<=0)return false; const sx=e.x-cam.x,sy=e.y-cam.y-(1-e.timer)*30; ctx.globalAlpha=Math.min(1,e.timer*2);ctx.fillStyle=e.color; ctx.font="bold 14px Orbitron,monospace";ctx.textAlign="center";ctx.textBaseline="middle"; ctx.fillText(e.text,sx,sy);ctx.globalAlpha=1; return true; }); }

      function drawMinimap(){ const mw=minimapCanvas.width,mh=minimapCanvas.height; const scaleX=mw/WORLD_W,scaleY=mh/WORLD_H; mmCtx.clearRect(0,0,mw,mh);mmCtx.fillStyle="#08090f";mmCtx.fillRect(0,0,mw,mh); for(let ty=0;ty<WORLD_H;ty+=2)for(let tx=0;tx<WORLD_W;tx+=2){ const tile=worldMap[ty]?.[tx]??0;mmCtx.fillStyle=TILE_COLORS[tile]||"#2d5a27"; mmCtx.fillRect(tx*scaleX,ty*scaleY,scaleX*2+1,scaleY*2+1); }
        // Otros jugadores en el minimap (puntos cyan)
        mmCtx.fillStyle="#00e5ff";
        for(const p of Object.values(otherPlayers)){ mmCtx.beginPath();mmCtx.arc((p.x/TILE)*scaleX,(p.y/TILE)*scaleY,2,0,Math.PI*2);mmCtx.fill(); }
        mmCtx.fillStyle="#ff1744";enemies.forEach(e=>{if(e.state==="dead")return;mmCtx.fillRect((e.x/TILE)*scaleX-1,(e.y/TILE)*scaleY-1,2,2);}); mmCtx.fillStyle="#ffd600";dragonBallObjects.forEach(db=>{if(db.collected)return;mmCtx.beginPath();mmCtx.arc((db.x/TILE)*scaleX,(db.y/TILE)*scaleY,2,0,Math.PI*2);mmCtx.fill();}); mmCtx.fillStyle="#00e5ff";npcs.forEach(npc=>{mmCtx.fillRect((npc.x/TILE)*scaleX-1.5,(npc.y/TILE)*scaleY-1.5,3,3);}); const px=(player.x/TILE)*scaleX,py=(player.y/TILE)*scaleY; mmCtx.fillStyle=charColor;mmCtx.shadowColor=charColor;mmCtx.shadowBlur=4; mmCtx.beginPath();mmCtx.arc(px,py,2.5,0,Math.PI*2);mmCtx.fill();mmCtx.shadowBlur=0; mmCtx.strokeStyle="rgba(255,255,255,0.2)";mmCtx.lineWidth=1; mmCtx.strokeRect((cam.x/TILE)*scaleX,(cam.y/TILE)*scaleY,(canvas.width/TILE)*scaleX,(canvas.height/TILE)*scaleY); }

      function drawAmbient(){ const skyColors={"TIERRAS FRÍAS":["#b0bec5","#78909c"],"DESIERTO ROJO":["#ff6f00","#bf360c"],"OCÉANO OESTE":["#0d47a1","#1565c0"],"BOSQUE OSCURO":["#1a237e","#0d1520"],MONTAÑAS:["#37474f","#263238"],"CAPSULE CORP":["#0a0d1a","#111830"]}; const colors=skyColors[currentRegion]||skyColors["CAPSULE CORP"]; const skyGrad=ctx.createLinearGradient(0,0,0,canvas.height*.4); skyGrad.addColorStop(0,colors[0]+"44");skyGrad.addColorStop(1,"transparent"); ctx.fillStyle=skyGrad;ctx.fillRect(0,0,canvas.width,canvas.height*.4); if(currentRegion==="BOSQUE OSCURO"||currentRegion==="TIERRAS FRÍAS"){ const t=Date.now()*.001; for(let i=0;i<20;i++){const sx=(i*1234567)%canvas.width,sy=(i*7654321)%(canvas.height*.3);ctx.globalAlpha=(.3+.7*Math.abs(Math.sin(t+i)))*.4;ctx.fillStyle="rgba(255,255,255,0.6)";ctx.fillRect(sx,sy,1.5,1.5);} ctx.globalAlpha=1; } }

      // ═══════════════════════════════════════════════════════════════
      //  LOAD GAME
      // ═══════════════════════════════════════════════════════════════
      async function loadGame(){
        const steps=[
          ["GENERANDO TERRENO...", ()=>{}],
          ["COLOCANDO ENEMIGOS...", spawnEnemies],
          ["SPAWNING DRAGON BALLS...", spawnDragonBalls],
          ["CARGANDO PERSONAJE...", async()=>{
            const CS = window.CharacterSystem;
            if(CS){ try{
              // Restaurar accesorios de usuario
              try{ const rawAcc=localStorage.getItem("dragonCreatorZ_accessories"); if(rawAcc){const accList=JSON.parse(rawAcc);if(Array.isArray(accList))await CS.restoreUserAccessories(accList);} }catch(accErr){console.warn("[game] No se pudieron restaurar accesorios:",accErr);}
              csImageMap=await CS.preloadAssets("");
              CS.initPlayer();
              if(savedChar){
                const rid=savedChar.race||"human",gen=savedChar.gender||"male";
                const defs=CS.getDefaultIds(rid,gen);
                CS.player.appearance.raceId=rid;
                CS.player.appearance.gender=gen;
                CS.player.appearance.faceId=savedChar.faceId||defs.faceId;
                CS.player.appearance.faceColor=savedChar.faceColor||null;
                CS.player.appearance.eyeColor=savedChar.eyeColor||"#3a2a1a";
                CS.player.appearance.browColor=savedChar.browColor||null;
                CS.player.appearance.pupilColor=savedChar.pupilColor||null;
                CS.player.appearance.hairId=savedChar.hair||defs.hairId;
                CS.player.appearance.hairColor=savedChar.hairColor||"#1a1a1a";
                CS.player.appearance.topId=savedChar.shirt||defs.topId;
                CS.player.appearance.bottomId=savedChar.pants||defs.bottomId;
                CS.player.appearance.shoesId=savedChar.shoes||defs.shoesId;
                CS.player.appearance.glovesId=savedChar.gloves||defs.glovesId;
                CS.player.appearance.skinColor=savedChar.skinColor||"#e8c898";
                CS.player.appearance.auraId=savedChar.aura||"a0";
                CS.player.appearance.auraColor=savedChar.auraColor||"#fdd835";
                // ── Accesorios: tomar del campo guardado ──
                CS.player.appearance.accessoryId=savedChar.accessory||savedChar.accessoryId||"ac_none";
              }
              CS.player.direction=player.facing;
              csAnimator=new CS.SpriteAnimator("idle");
            }catch(err){console.warn("[game] CharacterSystem error:",err);csImageMap=null;csAnimator=null;} }
            document.getElementById("hudPlayerName").textContent=player.name;
            updatePlayerHud();
            document.getElementById("missionBox").classList.add("visible");
          }],
          ["CONECTANDO AL SERVIDOR...", async()=>{ buildMpHud(); initMultiplayer(); await new Promise(r=>setTimeout(r,500)); }],
          ["¡LISTO PARA COMBATIR!", ()=>{}],
        ];
        const bar=document.getElementById("loadBar"),label=document.getElementById("loadLabel");
        for(let i=0;i<steps.length;i++){ label.textContent=steps[i][0]; bar.style.width=`${((i+1)/steps.length)*100}%`; await Promise.resolve(steps[i][1]()); await new Promise(r=>setTimeout(r,300)); }
        await new Promise(r=>setTimeout(r,400));
        document.getElementById("screenLoading").style.display="none";
        gameState="playing";
        updatePlayerHud();
      }

      // ═══════════════════════════════════════════════════════════════
      //  GAME LOOP
      // ═══════════════════════════════════════════════════════════════
      function gameLoop(timestamp){
        const dt=Math.min((timestamp-lastTime)/1000,.05);
        lastTime=timestamp;
        if(gameState==="playing"){ updatePlayer(dt); enemies.forEach(e=>updateEnemy(e,dt)); updateProjectiles(dt); updateCamera(); if(player.charging){ player.chargeKi=(player.chargeKi||0)+dt; if(player.chargeKi>3){player.charging=false;player.chargeKi=0;} } }
        ctx.fillStyle="#08090f";ctx.fillRect(0,0,canvas.width,canvas.height);
        const CS = window.CharacterSystem;
        if(gameState==="playing"&&CS&&csAnimator)csAnimator.update(timestamp);
        drawAmbient();drawWorld();drawDragonBalls();drawNpcs();
        sendPlayerUpdate();drawOtherPlayers();drawEnemies();drawProjectiles();
        drawPlayerChar();drawParticles(dt);drawCombatEffects(dt);drawMinimap();
        requestAnimationFrame(gameLoop);
      }

      loadGame().then(()=>{ lastTime=performance.now(); requestAnimationFrame(gameLoop); });
    </script>
  </body>
